<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="white-translucent">
<title>Active Workout · Pulse</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;-webkit-font-smoothing:antialiased;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
button{cursor:pointer;border:none;background:none;font-family:inherit;color:inherit}
input{font-family:inherit;border:none;outline:none;background:none;color:inherit}
:root{--bg:#021013;--text:#fff;--green:#00FF00;--muted:#5E6C7A;--slate:#C8D4E1;--card:#fff;--secondary:#A1A1A1;--red:#ff6b6b;--blue:#5b9cf6;--font:'Albert Sans',system-ui,sans-serif;--ease:cubic-bezier(0.22,0.36,0,1);--ease-bounce:cubic-bezier(0.34,1.56,0.64,1);--ease-soft:cubic-bezier(0.16,1,0.3,1)}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100dvh;overflow-x:hidden}

/* ── Respect user preferences ── */
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important;scroll-behavior:auto!important}
}

/* ── Global page enter animation ── */
.screen{animation:pageIn .5s var(--ease-soft) both}
@keyframes pageIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── Stagger helpers ── */
.stagger-item{opacity:0;animation:staggerIn .45s var(--ease-soft) forwards}
@keyframes staggerIn{
  from{opacity:0;transform:translateY(12px) scale(0.98)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
.screen{width:100%;max-width:430px;margin:0 auto;display:flex;flex-direction:column;gap:4px;padding:0 8px env(safe-area-inset-bottom,24px);padding-top:max(env(safe-area-inset-top,0px),0px);min-height:100dvh}

/* ── CALENDAR ── */
.cal-strip{padding:8px 8px 4px;flex-shrink:0}
.cal-nav{display:flex;justify-content:space-between;align-items:center;padding:4px 8px 6px}
.cal-nav__label{font-size:12px;font-weight:500;color:var(--secondary);letter-spacing:.05em}
.cal-nav__btn{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.08);display:grid;place-items:center;transition:background .2s var(--ease),transform .2s var(--ease)}
.cal-nav__btn:hover{background:rgba(255,255,255,0.14)}
.cal-nav__btn:active{transform:scale(0.88)}
.cal-week{display:flex;justify-content:space-between;gap:2px}
.cal-day{flex:1;padding:6px 2px;border-radius:999px;display:flex;flex-direction:column;align-items:center;gap:1px;cursor:pointer;transition:background .22s var(--ease-soft),transform .15s var(--ease);position:relative}
.cal-day:active{transform:scale(0.92)}
.cal-day--selected{background:rgba(255,255,255,0.12);animation:calSelect .35s var(--ease-bounce)}
@keyframes calSelect{
  0%{transform:scale(0.85)}
  60%{transform:scale(1.06)}
  100%{transform:scale(1)}
}
.cal-day__letter{height:16px;text-align:center;font-size:11px;font-weight:600;text-transform:uppercase;line-height:16px;color:var(--secondary);font-family:'Inter',sans-serif;letter-spacing:.05em;transition:color .25s var(--ease)}
.cal-day--selected .cal-day__letter{color:var(--text)}
.cal-day__date{height:28px;text-align:center;font-size:18px;font-weight:400;line-height:28px;color:var(--secondary);transition:color .25s var(--ease)}
.cal-day--selected .cal-day__date{color:var(--text)}
.cal-day--today .cal-day__date{background:var(--green);color:var(--bg);border-radius:50%;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-weight:600;margin:0 auto}
/* dot indicators for run/workout/rest days */
.cal-day__dots{display:flex;gap:2px;justify-content:center;margin-top:2px;height:6px}
.cal-dot{width:4px;height:4px;border-radius:50%}
.cal-dot--run{background:var(--blue)}
.cal-dot--lift{background:var(--green)}
.cal-dot--rest{background:var(--muted)}

/* ── CONTROLS ── */
.controls{display:flex;justify-content:space-between;align-items:center;padding:4px 8px;flex-shrink:0}
.glass-btn{width:44px;height:44px;border-radius:999px;display:grid;place-items:center;background:rgba(255,255,255,0.65);box-shadow:0 8px 40px rgba(0,0,0,0.12);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.25);transition:transform .2s var(--ease-bounce),opacity .15s var(--ease),box-shadow .25s var(--ease)}
.glass-btn:hover{box-shadow:0 12px 48px rgba(0,0,0,0.18)}
.glass-btn:active{transform:scale(0.88);opacity:.8}

/* ── HEADER ── */
.top-row{padding:8px 16px 8px;flex-shrink:0;animation:headerIn .55s var(--ease-soft) both .08s}
@keyframes headerIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.session-name{font-size:24px;font-weight:400;line-height:1.2;margin-bottom:4px;transition:opacity .3s var(--ease)}
.session-day-tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
.session-day-tag--run{background:rgba(91,156,246,0.15);border:1px solid rgba(91,156,246,0.3);color:var(--blue)}
.session-day-tag--lift{background:rgba(0,255,0,0.1);border:1px solid rgba(0,255,0,0.25);color:var(--green)}
.session-day-tag--both{background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.15);color:var(--secondary)}
.session-day-tag--rest{background:rgba(94,108,122,0.15);border:1px solid rgba(94,108,122,0.25);color:var(--muted)}
.session-meta{display:flex;align-items:center;gap:8px}
.meta-timer{font-size:12px;font-weight:500;color:var(--green);font-variant-numeric:tabular-nums;transition:opacity .3s var(--ease)}
.meta-dot{width:3px;height:3px;border-radius:50%;background:var(--green);animation:dotPulse 1.6s ease-in-out infinite}
@keyframes dotPulse{0%,100%{opacity:.5;transform:scale(1)}50%{opacity:1;transform:scale(1.6)}}
.meta-status{font-size:12px;font-weight:500;color:var(--green)}
.sync-btn{margin-left:auto;display:flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;background:rgba(0,255,0,0.1);border:1px solid rgba(0,255,0,0.25);font-size:11px;font-weight:600;color:var(--green);letter-spacing:.04em;transition:opacity .15s}
.sync-btn:active{opacity:.7}
.sync-btn.syncing svg{animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── RUN CARD ── */
.run-card{background:#0a1f35;border:1.5px solid rgba(91,156,246,0.3);border-radius:24px;padding:18px 20px;margin-bottom:4px;flex-shrink:0}
.run-card__label{font-size:10px;font-weight:600;letter-spacing:.15em;text-transform:uppercase;color:var(--blue);margin-bottom:6px}
.run-card__title{font-size:20px;font-weight:500;color:var(--text);margin-bottom:8px}
.run-card__details{display:flex;flex-direction:column;gap:4px}
.run-card__detail{font-size:13px;color:var(--secondary);line-height:1.4}
.run-card__detail strong{color:var(--text);font-weight:500}
.run-card__intervals{margin-top:8px;padding-top:8px;border-top:1px solid rgba(91,156,246,0.15)}
.run-card__interval{font-size:12px;color:var(--secondary);padding:3px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.run-card__interval:last-child{border-bottom:none}
.run-card__badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:999px;background:rgba(91,156,246,0.15);font-size:11px;color:var(--blue);font-weight:600;margin-top:8px}
.run-complete-btn{margin-top:14px;width:100%;padding:12px;border-radius:999px;background:rgba(91,156,246,0.15);border:1.5px solid rgba(91,156,246,0.3);color:var(--blue);font-size:14px;font-weight:600;transition:background .15s,opacity .15s}
.run-complete-btn:active{opacity:.8}
.run-complete-btn.done{background:var(--blue);color:#fff;border-color:var(--blue)}

/* ── REST CARD ── */
.rest-card{background:#0d1a1c;border:1.5px solid rgba(94,108,122,0.2);border-radius:24px;padding:28px 20px;margin-bottom:4px;text-align:center;flex-shrink:0}
.rest-card__emoji{font-size:48px;margin-bottom:12px}
.rest-card__title{font-size:20px;font-weight:500;margin-bottom:8px}
.rest-card__sub{font-size:14px;color:var(--muted);line-height:1.5}

/* ── SECTION LABEL ── */
.section-lbl-hdr{padding:10px 4px 4px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--secondary);letter-spacing:.1em;text-transform:uppercase}

/* ── EX LIST ── */
.ex-list{display:flex;flex-direction:column;gap:4px;flex:1;overflow-y:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.ex-list::-webkit-scrollbar{display:none}
.up-next-lbl{padding:10px 16px 2px;font-family:'Inter',sans-serif;font-size:12px;font-weight:500;color:var(--text);opacity:.7;letter-spacing:.04em}

/* ── PILLS ── */
.ex-pill{display:flex;align-items:center;gap:14px;padding:10px 14px 10px 10px;border-radius:999px;cursor:pointer;transition:transform .2s var(--ease-bounce),background .3s var(--ease-soft),box-shadow .25s var(--ease);-webkit-user-select:none;user-select:none;will-change:transform}
.ex-pill:hover{transform:translateX(2px)}
.ex-pill:active{transform:scale(0.97);transition-duration:.1s}
.ex-pill--upcoming{background:transparent}
.ex-pill--partial{background:var(--card);box-shadow:0 4px 20px rgba(0,255,0,0.08)}
.ex-pill--complete{background:var(--green);box-shadow:0 4px 24px rgba(0,255,0,0.25);animation:pillComplete .5s var(--ease-bounce)}
@keyframes pillComplete{
  0%{transform:scale(1)}
  40%{transform:scale(1.03)}
  100%{transform:scale(1)}
}
.ex-pill--superset{border-left:3px solid var(--green);margin-left:4px;border-radius:0 999px 999px 0;padding-left:10px}
.ex-pill--upcoming.ex-pill--superset{border-color:rgba(0,255,0,0.35)}
.pill-badge{display:flex;align-items:center;justify-content:center;gap:3px;padding:6px 10px;border-radius:999px;font-size:13px;font-weight:600;line-height:1;white-space:nowrap;flex-shrink:0;min-width:60px;height:46px;text-align:center;letter-spacing:.02em}
.pill-badge__x{width:6px;height:6px;flex-shrink:0}
.ex-pill--upcoming .pill-badge{background:var(--slate);color:var(--bg)}
.ex-pill--partial .pill-badge{background:var(--green);color:var(--bg)}
.ex-pill--complete .pill-badge{background:transparent;color:var(--bg)}
.pill-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:2px}
.pill-name{font-size:15px;font-weight:500;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-pill--upcoming .pill-name{color:var(--text)}
.ex-pill--partial .pill-name,.ex-pill--complete .pill-name{color:var(--bg)}
.pill-sub{font-size:12px;color:var(--muted);white-space:nowrap}
.pill-last--nodata{color:var(--muted);opacity:.6;font-style:italic}
.superset-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;background:rgba(0,255,0,0.12);color:var(--green);margin-right:4px}
.ex-pill--partial .superset-tag,.ex-pill--complete .superset-tag{background:rgba(2,16,19,0.2);color:var(--bg)}
.pill-icon{flex-shrink:0;width:24px;height:24px;display:grid;place-items:center}

/* ── OPEN CARD ── */
.ex-open{background:var(--card);border-radius:32px;padding:8px;display:flex;flex-direction:column;gap:10px;box-shadow:0 12px 48px rgba(0,0,0,0.18);animation:openIn .38s var(--ease-soft)}
@keyframes openIn{
  0%{opacity:0;transform:scale(0.94) translateY(-4px);max-height:80px}
  60%{opacity:1}
  100%{opacity:1;transform:scale(1) translateY(0);max-height:2000px}
}
.ex-open__hdr{padding:8px 8px 4px;display:flex;flex-direction:column;gap:6px;cursor:pointer;animation:fadeInUp .45s var(--ease-soft) .06s both}
@keyframes fadeInUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.ex-open__title-row{display:flex;justify-content:space-between;align-items:center}
.ex-open__title{font-size:20px;font-weight:500;color:var(--bg);line-height:1.2}
.ex-open__chevron{color:var(--bg);transition:transform .25s var(--ease-bounce)}
.ex-open__hdr:hover .ex-open__chevron{transform:translateY(1px)}
.ex-open__desc{font-size:13px;font-weight:500;color:#302934;line-height:1.45}
.sets-hdr{display:flex;padding:4px}
.sets-hdr__kg{padding-left:12px;flex:1;text-align:left;font-size:12px;font-weight:500;color:var(--muted)}
.sets-hdr__reps{padding-left:24px;flex:1;text-align:left;font-size:12px;font-weight:500;color:var(--muted)}
.sets-hdr__set{width:72px;text-align:right;padding-right:20px;font-size:12px;font-weight:500;color:var(--muted)}

/* ── SET ROWS ── */
.set-row{display:flex;align-items:center;gap:4px;height:60px;border-radius:999px;padding:4px;cursor:pointer;transition:background .35s var(--ease-soft),transform .18s var(--ease-bounce),box-shadow .3s var(--ease);animation:setRowIn .4s var(--ease-soft) both}
.set-row:active{transform:scale(0.985)}
@keyframes setRowIn{
  from{opacity:0;transform:translateX(-8px)}
  to{opacity:1;transform:translateX(0)}
}
.set-row--done{background:var(--green);animation:setDone .6s var(--ease-bounce)}
@keyframes setDone{
  0%{transform:scale(1)}
  30%{transform:scale(1.02);box-shadow:0 0 0 0 rgba(0,255,0,0.5)}
  60%{box-shadow:0 0 0 16px rgba(0,255,0,0)}
  100%{transform:scale(1);box-shadow:0 4px 20px rgba(0,255,0,0.2)}
}
.set-row--active{background:var(--card)}
.set-row--pending{background:var(--card);opacity:.88}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(0,255,0,0)}50%{box-shadow:0 0 0 6px rgba(0,255,0,0.12)}}
.set-row--active{animation:glow 2.5s ease-in-out infinite,setRowIn .4s var(--ease-soft) both}
.set-cell{flex:1;height:100%;padding-left:16px;border-radius:999px;display:flex;align-items:center;transition:background .3s var(--ease-soft)}
.set-row--done .set-cell{background:transparent}
.set-row--active .set-cell,.set-row--pending .set-cell{background:rgba(200,212,225,0.25)}
.set-row--active .set-cell:focus-within{background:rgba(0,255,0,0.15);transition:background .2s var(--ease)}
.cell-val{font-size:16px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--bg);pointer-events:none}
.cell-input{width:100%;text-align:left;font-size:16px;font-weight:500;text-transform:uppercase;letter-spacing:.05em;color:var(--bg);caret-color:var(--green);transition:transform .15s var(--ease)}
.cell-input:focus{transform:scale(1.02)}
.set-right{width:72px;height:100%;display:flex;align-items:center;justify-content:flex-end;padding-right:20px}
.set-right__val{font-size:20px;font-weight:500;color:var(--bg)}
.set-controls{display:flex;justify-content:center;align-items:center;gap:4px;padding:4px 0 6px}
.set-ctrl-btn{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:999px;font-size:14px;font-weight:500;color:var(--bg);transition:opacity .15s,transform .15s}
.set-ctrl-btn:active{opacity:.7;transform:scale(0.97)}
.set-ctrl-icon{width:28px;height:28px;border-radius:50%;display:grid;place-items:center}
.set-ctrl-icon--add{background:var(--slate)}
.set-ctrl-icon--remove{background:#ffdddd}

/* ── BOTTOM ACTIONS ── */
.ex-actions{display:flex;gap:8px;padding:8px 0 4px;flex-shrink:0;animation:fadeInUp .5s var(--ease-soft) .15s both}
.ex-action-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;padding:14px;border-radius:24px;font-size:14px;font-weight:500;transition:transform .2s var(--ease-bounce),opacity .15s,background .25s var(--ease),box-shadow .25s var(--ease)}
.ex-action-btn:hover{transform:translateY(-1px)}
.ex-action-btn:active{opacity:.8;transform:scale(0.96);transition-duration:.1s}
.ex-action-btn--add{background:rgba(0,255,0,0.1);border:1.5px solid rgba(0,255,0,0.3);color:var(--green)}
.ex-action-btn--add:hover{background:rgba(0,255,0,0.16);box-shadow:0 6px 20px rgba(0,255,0,0.15)}
.ex-action-btn--remove{background:rgba(255,60,60,0.08);border:1.5px solid rgba(255,60,60,0.25);color:#ff6b6b}
.ex-action-btn--remove:hover{background:rgba(255,60,60,0.14);box-shadow:0 6px 20px rgba(255,60,60,0.12)}

/* ── ADD EX MODAL ── */
.modal-backdrop{display:none;position:fixed;inset:0;z-index:150;background:rgba(2,16,19,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);align-items:flex-end;justify-content:center}
.modal-backdrop.show{display:flex}
.modal{width:100%;max-width:430px;background:#0d2226;border-radius:32px 32px 0 0;padding:16px 16px env(safe-area-inset-bottom,24px);animation:slideUp .28s cubic-bezier(0.22,0.36,0,1);max-height:80dvh;display:flex;flex-direction:column}
@keyframes slideUp{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.modal__handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:0 auto 16px}
.modal__title{font-size:18px;font-weight:600;margin-bottom:12px;padding:0 4px}
.modal__search{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:12px 14px;margin-bottom:12px}
.modal__search input{flex:1;font-size:15px;color:var(--text)}
.modal__search input::placeholder{color:var(--muted)}
.modal__list{overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:4px;scrollbar-width:none}
.modal__list::-webkit-scrollbar{display:none}
.modal-ex-item{display:flex;align-items:center;justify-content:space-between;padding:14px 16px;border-radius:16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.08);cursor:pointer;transition:background .2s var(--ease),transform .15s var(--ease-bounce),border-color .2s var(--ease);animation:modalItemIn .35s var(--ease-soft) both}
@keyframes modalItemIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.modal-ex-item:hover{background:rgba(255,255,255,0.09);border-color:rgba(0,255,0,0.15);transform:translateX(2px)}
.modal-ex-item:active{background:rgba(255,255,255,0.12);transform:scale(0.98)}
.modal-ex-item__name{font-size:15px;font-weight:500}
.modal-ex-item__muscle{font-size:12px;color:var(--muted);margin-top:2px}
.modal-ex-item__add{width:28px;height:28px;border-radius:50%;background:rgba(0,255,0,0.15);display:grid;place-items:center;flex-shrink:0}

/* ── SETTINGS ── */
.settings-page{display:none;position:fixed;inset:0;z-index:100;background:var(--bg);flex-direction:column;padding:max(env(safe-area-inset-top,0px),16px) 20px env(safe-area-inset-bottom,24px);overflow-y:auto}
.settings-page.show{display:flex}
.settings-page__hdr{display:flex;align-items:center;gap:14px;margin-bottom:28px}
.settings-page__title{font-size:22px;font-weight:600}
.s-section{font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:10px;margin-top:24px}
.s-field{margin-bottom:10px}
.s-field label{display:block;font-size:13px;font-weight:500;color:var(--secondary);margin-bottom:6px}
.s-field input{width:100%;padding:14px 16px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:14px;font-size:15px;color:var(--text);transition:border-color .15s}
.s-field input:focus{border-color:rgba(0,255,0,0.4)}
.s-field input::placeholder{color:var(--muted)}
.save-btn{margin-top:20px;width:100%;padding:18px;border-radius:999px;background:var(--green);color:var(--bg);font-size:16px;font-weight:700;transition:opacity .15s}
.save-btn:active{opacity:.8}
.sync-status-box{margin-top:16px;padding:14px 16px;border-radius:14px;background:rgba(0,255,0,0.07);border:1px solid rgba(0,255,0,0.15);font-size:13px;color:var(--green);line-height:1.5;white-space:pre-line}
.pull-btn{margin-top:12px;width:100%;padding:16px;border-radius:999px;background:rgba(0,255,0,0.1);border:1.5px solid rgba(0,255,0,0.3);color:var(--green);font-size:15px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:8px}
.pull-btn:active{opacity:.8}
.pull-btn.syncing svg{animation:spin 1s linear infinite}
.info-text{font-size:12px;color:var(--muted);line-height:1.6;margin-top:8px}

/* ── COMPLETE OVERLAY ── */
.overlay{display:none;position:fixed;inset:0;background:var(--green);z-index:200;flex-direction:column;align-items:center;justify-content:center;gap:28px;padding:40px 32px env(safe-area-inset-bottom,40px)}
.overlay.show{display:flex;animation:overlayIn .55s var(--ease-soft)}
@keyframes overlayIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
.overlay__check{width:88px;height:88px;border-radius:50%;background:var(--bg);display:grid;place-items:center;animation:checkPop .7s var(--ease-bounce) .15s both}
@keyframes checkPop{
  0%{opacity:0;transform:scale(0) rotate(-90deg)}
  60%{transform:scale(1.15) rotate(10deg)}
  100%{opacity:1;transform:scale(1) rotate(0)}
}
.overlay__check svg{animation:checkDraw .5s var(--ease-bounce) .45s both}
@keyframes checkDraw{
  from{opacity:0;transform:scale(0.5)}
  to{opacity:1;transform:scale(1)}
}
.overlay__title{font-size:48px;font-weight:700;color:var(--bg);text-align:center;line-height:1.05;animation:fadeInUp .55s var(--ease-soft) .3s both}
.overlay__stats{display:flex;gap:40px;animation:fadeInUp .55s var(--ease-soft) .45s both}
.overlay__stat{text-align:center;color:var(--bg)}
.overlay__stat-val{font-size:36px;font-weight:700;line-height:1}
.overlay__stat-lbl{font-size:11px;font-weight:600;opacity:.55;letter-spacing:.12em;text-transform:uppercase;margin-top:6px}
.overlay__btn{width:100%;max-width:340px;padding:20px;border-radius:999px;background:var(--bg);color:var(--green);font-size:17px;font-weight:700;text-align:center;margin-top:8px;transition:transform .2s var(--ease-bounce),opacity .15s;animation:fadeInUp .55s var(--ease-soft) .6s both}
.overlay__btn:hover{transform:translateY(-2px)}
.overlay__btn:active{transform:scale(0.97);opacity:.85}

/* TOAST */
.toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%) translateY(24px) scale(0.92);background:#1a3a3a;color:var(--text);padding:12px 22px;border-radius:999px;font-size:13px;font-weight:500;opacity:0;transition:opacity .32s var(--ease-soft),transform .4s var(--ease-bounce);pointer-events:none;z-index:300;white-space:nowrap;border:1px solid rgba(0,255,0,0.2);box-shadow:0 8px 32px rgba(0,0,0,0.3),0 0 0 1px rgba(0,255,0,0.08)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}

/* ── START / PAUSE BUTTON ── */
.workout-cta-wrap{
  padding:8px 0 8px;
  flex-shrink:0;
  position:sticky;
  bottom:env(safe-area-inset-bottom,8px);
  z-index:40;
  animation:ctaSlideIn .6s var(--ease-soft) .25s both;
}
@keyframes ctaSlideIn{
  from{opacity:0;transform:translateY(20px)}
  to{opacity:1;transform:translateY(0)}
}
.workout-cta{
  position:relative;
  overflow:hidden;
  width:100%;height:84px;
  padding:8px 8px 8px 32px;
  border-radius:999px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:0;
  transition:background 0.35s var(--ease-soft), box-shadow 0.35s var(--ease), transform 0.2s var(--ease-bounce);
  -webkit-user-select:none;user-select:none;
  cursor:pointer;
  border:none;
  font-family:var(--font);
  will-change:transform;
}
.workout-cta:hover{transform:translateY(-2px)}
.workout-cta:active{transform:scale(0.985);transition-duration:.08s}
.workout-cta--start{
  background:var(--green);
  box-shadow:0 8px 40px rgba(0,255,0,0.25);
  animation:greenPulse 2.8s ease-in-out infinite;
}
@keyframes greenPulse{
  0%,100%{box-shadow:0 8px 40px rgba(0,255,0,0.25)}
  50%{box-shadow:0 12px 56px rgba(0,255,0,0.45)}
}
.workout-cta--pause{
  background:#fff;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);
  animation:none;
}
.workout-cta__label{
  flex:1;
  text-align:center;
  font-size:26px;
  font-weight:400;
  font-family:'Inter',sans-serif;
  line-height:1.2;
  color:var(--bg);
  transition:color 0.25s var(--ease), transform 0.3s var(--ease-soft);
}
.workout-cta__icon{
  width:68px;height:68px;
  border-radius:999px;
  display:grid;place-items:center;
  flex-shrink:0;
  transition:background 0.35s var(--ease-soft),transform 0.3s var(--ease-bounce);
}
.workout-cta:hover .workout-cta__icon{transform:scale(1.05)}
.workout-cta--start .workout-cta__icon{background:var(--bg)}
.workout-cta--pause .workout-cta__icon{background:var(--green)}
.workout-cta__icon svg{transition:transform .35s var(--ease-bounce)}
.workout-cta:active .workout-cta__icon svg{transform:scale(0.88)}

/* Hold-to-end progress ring overlay */
.hold-ring{
  position:absolute;
  inset:0;
  border-radius:999px;
  pointer-events:none;
  overflow:hidden;
}
.hold-ring::after{
  content:'';
  position:absolute;
  inset:0;
  border-radius:999px;
  background:rgba(255,60,60,0.18);
  transform:scaleX(0);
  transform-origin:left center;
  transition:none;
}
.hold-ring.holding::after{
  transform:scaleX(1);
  transition:transform 3s linear;
}

/* Paused dim overlay on ex-list */
.ex-list.paused{opacity:0.35;filter:blur(1px);pointer-events:none;transition:opacity .4s var(--ease-soft),filter .4s var(--ease-soft)}
.paused-badge{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.92);
  background:rgba(2,16,19,0.92);border:1.5px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:18px 32px;
  font-size:16px;font-weight:600;color:var(--secondary);
  letter-spacing:.04em;z-index:35;pointer-events:none;
  opacity:0;
  transition:opacity .3s var(--ease-soft),transform .35s var(--ease-bounce);
  display:block;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.paused-badge.show{
  opacity:1;
  transform:translate(-50%,-50%) scale(1);
  animation:pausedPulse 2.5s ease-in-out infinite .35s;
}
@keyframes pausedPulse{
  0%,100%{border-color:rgba(255,255,255,0.1)}
  50%{border-color:rgba(0,255,0,0.25)}
}
</style>
</head>

/* ════════════════════════════════════════
   STATE
════════════════════════════════════════ */
const today = new Date();
const todayDow = today.getDay(); // 0=Sun

let currentDow = todayDow;
let currentPlan = null;
let exState = [];
let openIdx = null;
let runDone = false;
let startTime = Date.now();
let timerH = null;
let totalSets = 0;
let lastData = {}; // {exId: 'xkg × y reps' | null}
let workoutStarted = false; // new — controls whether timer runs
let workoutPaused  = false;
let pausedElapsed  = 0;     // accumulated seconds before current pause

const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAY_LETTERS = ['S','M','T','W','T','F','S'];
const DOW_NAMES = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

// Week start (Monday of current week)
function getMonday(d) {
  const date = new Date(d), day = date.getDay(), diff = day===0?-6:1-day;
  date.setDate(date.getDate()+diff); return date;
}
let weekStart = getMonday(today);
let selectedDate = new Date(today);

/* ════════════════════════════════════════
   LOAD DAY
════════════════════════════════════════ */
function loadDay(dow, date) {
  currentDow = dow;
  currentPlan = WEEKLY_PLAN[dow];
  runDone = false;
  totalSets = 0;
  openIdx = null;

  // Build exState from plan
  if (currentPlan && currentPlan.exercises.length > 0) {
    exState = currentPlan.exercises.map((ex, i) => ({
      status: i === 0 ? 'open' : 'upcoming',
      doneSets: 0,
      sets: Array.from({length: ex.sets}, () => ({kg: ex.kg, reps: parseRepsDefault(ex.reps)})),
      planReps: ex.reps,
    }));
    openIdx = 0;
  } else {
    exState = [];
  }

  // Reset timer — does NOT auto-start; waits for Start button
  clearInterval(timerH);
  timerH = null;
  startTime = Date.now();
  pausedElapsed = 0;
  workoutStarted = false;
  workoutPaused  = false;
  resetCTA();

  // Update header
  document.getElementById('session-name').textContent = currentPlan ? currentPlan.title : DOW_NAMES[dow];
  const tagEl = document.getElementById('session-tag');
  if (currentPlan) {
    const tagClass = {'both':'both','lift':'lift','run':'run','rest':'rest'}[currentPlan.type] || 'lift';
    tagEl.innerHTML = `<div class="session-day-tag session-day-tag--${tagClass}">${DOW_NAMES[dow]}</div>`;
  } else tagEl.innerHTML = '';

  // Show/hide bottom actions for rest/run-only days
  const hasStrength = currentPlan && currentPlan.exercises.length > 0;
  document.getElementById('ex-actions').style.display = hasStrength ? 'flex' : 'none';

  renderExList();
}

function parseRepsDefault(repsStr) {
  if (!repsStr || repsStr === 'AMRAP') return 0; // 0 = AMRAP
  if (repsStr.includes('-')) return parseInt(repsStr.split('-')[0]);
  return parseInt(repsStr) || 8;
}

/* ════════════════════════════════════════
   CALENDAR
════════════════════════════════════════ */
function renderCalendar() {
  const strip = document.getElementById('cal-strip');
  strip.innerHTML = '';

  const nav = document.createElement('div'); nav.className = 'cal-nav';
  const lbl = document.createElement('div'); lbl.className = 'cal-nav__label';
  lbl.textContent = `${MONTHS[weekStart.getMonth()]} ${weekStart.getFullYear()}`;

  const prev = document.createElement('button'); prev.className = 'cal-nav__btn';
  prev.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M15 18l-6-6 6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  prev.addEventListener('click', () => { weekStart.setDate(weekStart.getDate()-7); renderCalendar(); });

  const next = document.createElement('button'); next.className = 'cal-nav__btn';
  next.innerHTML = '<svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M9 18l6-6-6-6" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>';
  next.addEventListener('click', () => { weekStart.setDate(weekStart.getDate()+7); renderCalendar(); });

  nav.appendChild(prev); nav.appendChild(lbl); nav.appendChild(next);
  strip.appendChild(nav);

  const week = document.createElement('div'); week.className = 'cal-week';

  for (let d = 0; d < 7; d++) {
    const date = new Date(weekStart); date.setDate(weekStart.getDate() + d);
    const dow = date.getDay();
    const isToday = date.toDateString() === today.toDateString();
    const isSel = date.toDateString() === selectedDate.toDateString();
    const plan = WEEKLY_PLAN[dow];

    const dayEl = document.createElement('div');
    dayEl.className = 'cal-day' + (isSel?' cal-day--selected':'') + (isToday?' cal-day--today':'');

    // Dots for day type
    let dots = '';
    if (plan) {
      if (plan.type === 'both') dots = '<div class="cal-dot cal-dot--run"></div><div class="cal-dot cal-dot--lift"></div>';
      else if (plan.type === 'run') dots = '<div class="cal-dot cal-dot--run"></div>';
      else if (plan.type === 'lift') dots = '<div class="cal-dot cal-dot--lift"></div>';
      else if (plan.type === 'rest') dots = '<div class="cal-dot cal-dot--rest"></div>';
    }

    dayEl.innerHTML = `<div class="cal-day__letter">${DAY_LETTERS[dow]}</div><div class="cal-day__date">${date.getDate()}</div><div class="cal-day__dots">${dots}</div>`;
    dayEl.addEventListener('click', () => {
      selectedDate = new Date(date);
      renderCalendar();
      loadDay(dow, date);
    });
    week.appendChild(dayEl);
  }
  strip.appendChild(week);
}

/* ════════════════════════════════════════
   TIMER
════════════════════════════════════════ */
function fmtTime(s) { return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`; }
function tick() {
  const el = document.getElementById('timer');
  if (!el) return;
  if (!workoutStarted || workoutPaused) return; // freeze display when not running
  const elapsed = pausedElapsed + Math.floor((Date.now() - startTime) / 1000);
  el.textContent = fmtTime(elapsed);
}

/* ════════════════════════════════════════
   CTA — START / PAUSE / HOLD-TO-END
════════════════════════════════════════ */
function resetCTA() {
  const btn   = document.getElementById('workout-cta');
  const label = document.getElementById('cta-label');
  const ring  = document.getElementById('hold-ring');
  const svgS  = document.getElementById('cta-svg-start');
  const svgP  = document.getElementById('cta-svg-pause');

  btn.className   = 'workout-cta workout-cta--start';
  label.textContent = 'Start workout';
  svgS.style.display = '';
  svgP.style.display = 'none';
  ring.classList.remove('holding');
  document.getElementById('timer').textContent = '0:00';
  document.getElementById('ex-list').classList.remove('paused');
  document.getElementById('paused-badge').classList.remove('show');
}

function setCTAPause() {
  const btn   = document.getElementById('workout-cta');
  const label = document.getElementById('cta-label');
  const svgS  = document.getElementById('cta-svg-start');
  const svgP  = document.getElementById('cta-svg-pause');
  btn.className   = 'workout-cta workout-cta--pause';
  label.textContent = 'Pause workout';
  svgS.style.display = 'none';
  svgP.style.display = '';
}

function startWorkout() {
  workoutStarted = true;
  workoutPaused  = false;
  startTime = Date.now(); // fresh reference for this running segment
  if (!timerH) timerH = setInterval(tick, 1000);
  tick();
  setCTAPause();
  document.getElementById('ex-list').classList.remove('paused');
  document.getElementById('paused-badge').classList.remove('show');
  if (navigator.vibrate) navigator.vibrate(20);
  showToast('Workout started ✓');
}

function pauseWorkout() {
  // Accumulate elapsed before pausing
  pausedElapsed += Math.floor((Date.now() - startTime) / 1000);
  workoutPaused = true;
  // Don't clear timerH — let it keep running but tick() won't update display
  // Visually dim the list
  document.getElementById('ex-list').classList.add('paused');
  document.getElementById('paused-badge').classList.add('show');
  const btn   = document.getElementById('workout-cta');
  const label = document.getElementById('cta-label');
  const svgS  = document.getElementById('cta-svg-start');
  const svgP  = document.getElementById('cta-svg-pause');
  btn.className   = 'workout-cta workout-cta--start';
  label.textContent = 'Resume workout';
  svgS.style.display = '';
  svgP.style.display = 'none';
}

function resumeWorkout() {
  workoutPaused = false;
  startTime = Date.now(); // new segment start
  tick();
  setCTAPause();
  document.getElementById('ex-list').classList.remove('paused');
  document.getElementById('paused-badge').classList.remove('show');
}

// Hold-to-end state
let holdTimer = null;
let holdStart = null;

function initCTA() {
  const btn  = document.getElementById('workout-cta');
  const ring = document.getElementById('hold-ring');

  // ── Tap handler ──
  btn.addEventListener('click', (e) => {
    // If we just finished a hold, ignore the trailing click
    if (btn.dataset.justEnded === '1') { btn.dataset.justEnded = '0'; return; }

    if (!workoutStarted) {
      startWorkout();
    } else if (workoutPaused) {
      resumeWorkout();
    } else {
      pauseWorkout();
    }
  });

  // ── Hold-to-end (only active when in pause state) ──
  function onHoldStart(e) {
    // Only allow hold-to-end while showing the pause button (workout running, not paused)
    if (!workoutStarted || workoutPaused) return;
    holdStart = Date.now();
    ring.classList.add('holding');
    holdTimer = setTimeout(() => {
      ring.classList.remove('holding');
      btn.dataset.justEnded = '1';
      endWorkout();
    }, 3000);
  }

  function onHoldEnd(e) {
    if (holdTimer) {
      clearTimeout(holdTimer);
      holdTimer = null;
    }
    ring.classList.remove('holding');
    // Force reflow so the CSS transition resets cleanly next time
    void ring.offsetWidth;
  }

  btn.addEventListener('mousedown',  onHoldStart);
  btn.addEventListener('touchstart', onHoldStart, {passive:true});
  btn.addEventListener('mouseup',    onHoldEnd);
  btn.addEventListener('mouseleave', onHoldEnd);
  btn.addEventListener('touchend',   onHoldEnd);
  btn.addEventListener('touchcancel',onHoldEnd);
}

function endWorkout() {
  // Snap final elapsed
  if (!workoutPaused) pausedElapsed += Math.floor((Date.now() - startTime) / 1000);
  if (navigator.vibrate) navigator.vibrate([30, 40, 60]);
  showComplete();
}

/* ════════════════════════════════════════
   TOAST
════════════════════════════════════════ */
let toastTmr;
function showToast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTmr); toastTmr = setTimeout(() => t.classList.remove('show'), 2400);
}

/* ════════════════════════════════════════
   RENDER EX LIST
════════════════════════════════════════ */
function renderExList() {
  const list = document.getElementById('ex-list');
  list.innerHTML = '';
  const plan = currentPlan;
  if (!plan) return;

  // Run card
  if (plan.run) {
    list.appendChild(buildRunCard(plan.run));
  }

  // Rest day
  if (plan.type === 'rest') {
    const rc = document.createElement('div'); rc.className = 'rest-card';
    rc.innerHTML = `<div class="rest-card__emoji">🧘</div><div class="rest-card__title">Rest & Recovery</div><div class="rest-card__sub">Foam rolling · Stretching · Yoga<br>Optional easy walk · Prioritize sleep</div>`;
    list.appendChild(rc);
    applyStagger(list);
    return;
  }

  // Strength label
  if (plan.strengthLabel && plan.exercises.length > 0) {
    const lbl = document.createElement('div'); lbl.className = 'section-lbl-hdr';
    lbl.textContent = plan.strengthLabel; list.appendChild(lbl);
  }

  // Exercises
  let shownLabel = false;
  plan.exercises.forEach((ex, i) => {
    const st = exState[i];
    if (!st) return;
    if (st.status === 'open') {
      list.appendChild(buildOpen(ex, i, st)); shownLabel = false;
    } else if (st.status === 'partial') {
      list.appendChild(buildPill(ex, i, st, 'partial'));
    } else if (st.status === 'complete') {
      list.appendChild(buildPill(ex, i, st, 'complete'));
    } else {
      if (!shownLabel) {
        const above = exState.slice(0,i).every(s => s.status !== 'upcoming');
        if (above && i > 0) { const l=document.createElement('div');l.className='up-next-lbl';l.textContent='up next';list.appendChild(l);shownLabel=true; }
      }
      list.appendChild(buildPill(ex, i, st, 'upcoming'));
    }
  });

  applyStagger(list);
}

/* Apply staggered entry animation to direct children of a list */
function applyStagger(list) {
  // Only stagger on the first render of a new day — skip if render is from a state change
  const children = Array.from(list.children);
  children.forEach((el, i) => {
    // Skip the currently-open card (has its own expansion animation)
    if (el.classList.contains('ex-open')) return;
    el.style.opacity = '0';
    el.style.transform = 'translateY(6px)';
    el.style.animation = `staggerIn .4s var(--ease-soft) ${30 * i}ms forwards`;
  });
}

/* ── Run card ── */
function buildRunCard(run) {
  const card = document.createElement('div'); card.className = 'run-card';
  let intervalsHtml = '';
  if (run.intervals && run.intervals.length > 0) {
    intervalsHtml = `<div class="run-card__intervals">${run.intervals.map(s => `<div class="run-card__interval">${s ? '· '+s : ''}</div>`).join('')}</div>`;
  }
  card.innerHTML = `
    <div class="run-card__label">🏃 ${run.label}</div>
    <div class="run-card__title">${run.distance} — ${run.type}</div>
    <div class="run-card__details">
      <div class="run-card__detail">${run.notes}</div>
    </div>
    ${intervalsHtml}
    <button class="run-complete-btn ${runDone?'done':''}" id="run-btn">
      ${runDone ? '✓ Run complete' : 'Mark run as complete'}
    </button>
  `;
  card.querySelector('#run-btn').addEventListener('click', () => {
    runDone = !runDone;
    renderExList();
    if (runDone) showToast('Run logged ✓');
  });
  return card;
}

/* ── Pill ── */
function buildPill(ex, i, st, variant) {
  const el = document.createElement('div');
  el.className = `ex-pill ex-pill--${variant}` + (ex.superset ? ' ex-pill--superset' : '');
  const ac = variant === 'upcoming' ? 'white' : '#021013';
  const rightIcon = variant === 'complete'
    ? `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M5 12.267l3.818 3.733L18 8" stroke="${ac}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`
    : `<svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M9 6l6 6-6 6" stroke="${ac}" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const hasData = lastData[ex.id] != null;
  const lastTxt = hasData ? `Last: ${lastData[ex.id]}` : '<span class="pill-last--nodata">No data</span>';
  const ssTag = ex.superset ? `<span class="superset-tag">SS</span>` : '';
  el.innerHTML = `${badgeHTML(ex)} <div class="pill-info"><div class="pill-name">${ssTag}${ex.name}</div><div class="pill-sub">${lastTxt}</div></div><div class="pill-icon">${rightIcon}</div>`;
  el.addEventListener('click', () => activateCard(i));
  return el;
}

/* ── Open card ── */
function buildOpen(ex, i, st) {
  const el = document.createElement('div'); el.className = 'ex-open';

  const hdr = document.createElement('div'); hdr.className = 'ex-open__hdr';
  const ssTag = ex.superset ? `<span class="superset-tag" style="font-size:10px;margin-right:6px">SUPERSET w/ ${ex.supersetWith}</span>` : '';
  hdr.innerHTML = `<div class="ex-open__title-row"><div class="ex-open__title">${ex.name}</div><div class="ex-open__chevron"><svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M18 9l-6 6-6-6" stroke="#021013" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div></div>${ssTag ? '<div style="padding:0 0 4px">'+ssTag+'</div>' : ''}<div class="ex-open__desc">${ex.desc}</div><div style="font-size:11px;color:#5E6C7A;margin-top:4px;font-weight:600">${ex.sets} sets × ${ex.reps} reps${ex.isBodyweight?'  (bodyweight)':''}</div>`;
  hdr.addEventListener('click', () => collapseCard(i));
  el.appendChild(hdr);

  const colHdr = document.createElement('div'); colHdr.className = 'sets-hdr';
  colHdr.innerHTML = ex.isBodyweight
    ? '<div class="sets-hdr__kg">reps done</div><div class="sets-hdr__reps" style="padding-left:0">notes</div><div class="sets-hdr__set">set</div>'
    : '<div class="sets-hdr__kg">kg</div><div class="sets-hdr__reps">reps</div><div class="sets-hdr__set">set</div>';
  el.appendChild(colHdr);

  const wrap = document.createElement('div'); wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
  st.sets.forEach((set, si) => wrap.appendChild(buildSetRow(set, si, st, i, ex)));

  // Add / remove set
  const ctrl = document.createElement('div'); ctrl.className = 'set-controls';
  const addB = document.createElement('button'); addB.className = 'set-ctrl-btn';
  addB.innerHTML = '<div class="set-ctrl-icon set-ctrl-icon--add"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="#021013" stroke-width="2" stroke-linecap="round"/></svg></div><span>add set</span>';
  addB.addEventListener('click', e => { e.stopPropagation(); st.sets.push({...st.sets[st.sets.length-1]}); renderExList(); });
  const remB = document.createElement('button'); remB.className = 'set-ctrl-btn';
  remB.innerHTML = '<div class="set-ctrl-icon set-ctrl-icon--remove"><svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 7h8" stroke="#c0392b" stroke-width="2" stroke-linecap="round"/></svg></div><span style="color:#c0392b">remove set</span>';
  remB.addEventListener('click', e => { e.stopPropagation(); if(st.sets.length<=1){showToast("Can't remove last set");return;} if(st.sets.length-1<st.doneSets){showToast("Can't remove completed sets");return;} st.sets.pop(); renderExList(); });
  ctrl.appendChild(addB); ctrl.appendChild(remB); wrap.appendChild(ctrl);
  el.appendChild(wrap);
  return el;
}

/* ── Set row ── */
function buildSetRow(set, si, st, exIdx, ex) {
  const isDone = si < st.doneSets, isActive = si === st.doneSets;
  const row = document.createElement('div');
  row.className = `set-row set-row--${isDone?'done':isActive?'active':'pending'}`;

  if (isDone) {
    const dispVal = ex.isBodyweight ? `${set.reps} reps` : `${set.kg}kg`;
    const disp2   = ex.isBodyweight ? '✓' : `${set.reps}`;
    row.innerHTML = `<div class="set-cell"><span class="cell-val">${dispVal}</span></div><div class="set-cell"><span class="cell-val">${disp2}</span></div><div class="set-right"><svg width="14" height="10" viewBox="0 0 14 10" fill="none"><path d="M1 5.267L4.818 9 13 1" stroke="#021013" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;
    row.style.cursor = 'pointer';
    row.addEventListener('click', () => uncompleteSet(exIdx, st, si));
  } else {
    const kgC = document.createElement('div'); kgC.className = 'set-cell';
    const kgI = document.createElement('input'); kgI.className = 'cell-input';
    if (ex.isBodyweight) {
      kgI.type = 'text'; kgI.inputMode = 'numeric';
      kgI.value = st.planReps === 'AMRAP' ? 'AMRAP' : `${set.reps}`;
      kgI.placeholder = 'reps';
      kgI.addEventListener('blur', () => { const v=parseInt(kgI.value); if(!isNaN(v))set.reps=v; });
    } else {
      kgI.type = 'text'; kgI.inputMode = 'decimal'; kgI.value = `${set.kg}kg`;
      kgI.addEventListener('focus', () => { kgI.value = set.kg; });
      kgI.addEventListener('blur', () => {
        const v = parseFloat(kgI.value); if(isNaN(v))return;
        for(let s=si;s<st.sets.length;s++){if(s>=st.doneSets)st.sets[s].kg=v;}
        renderExList();
      });
    }
    kgC.appendChild(kgI);

    const repC = document.createElement('div'); repC.className = 'set-cell';
    if (!ex.isBodyweight) {
      const repI = document.createElement('input'); repI.className = 'cell-input';
      repI.type = 'text'; repI.inputMode = 'numeric';
      repI.value = st.planReps === 'AMRAP' ? 'AMRAP' : set.reps;
      repI.placeholder = st.planReps || 'reps';
      repI.addEventListener('blur', () => { const v=parseInt(repI.value); if(!isNaN(v))set.reps=v; });
      repC.appendChild(repI);
    } else {
      repC.innerHTML = `<span class="cell-val" style="opacity:.4">BW</span>`;
    }

    const numC = document.createElement('div'); numC.className = 'set-right';
    numC.innerHTML = `<span class="set-right__val">${si+1}</span>`;
    row.appendChild(kgC); row.appendChild(repC); row.appendChild(numC);

    if (isActive) {
      row.style.cursor = 'pointer';
      row.addEventListener('click', e => { if(e.target.tagName==='INPUT')return; markSetDone(exIdx, st, ex); });
    }
  }
  return row;
}

/* ════════════════════════════════════════
   ACTIONS
════════════════════════════════════════ */
function activateCard(i) {
  if (exState[i].status === 'open') return;
  if (openIdx !== null && openIdx !== i && exState[openIdx]?.status === 'open') collapseCard(openIdx, false);
  exState[i].status = 'open'; openIdx = i; renderExList();
  setTimeout(() => document.querySelector('.ex-open')?.scrollIntoView({behavior:'smooth',block:'nearest'}), 50);
}
function collapseCard(i, doRender=true) {
  const st = exState[i];
  st.status = st.doneSets===0?'upcoming':st.doneSets>=st.sets.length?'complete':'partial';
  if(openIdx===i)openIdx=null; if(doRender)renderExList();
}
function markSetDone(i, st, ex) {
  if (!workoutStarted) { showToast('Tap Start workout first'); return; }
  if (workoutPaused)   { showToast('Resume workout to log sets'); return; }
  const set = st.sets[st.doneSets];
  lastData[ex.id] = ex.isBodyweight ? `${set.reps||'AMRAP'} reps` : `${set.kg}kg × ${set.reps} reps`;
  st.doneSets++; totalSets++;
  if (navigator.vibrate) navigator.vibrate(15); // short haptic
  syncPush();
  if (st.doneSets >= st.sets.length) {
    st.status = 'complete'; openIdx = null;
    const next = exState.findIndex((s,idx) => idx>i && s.status!=='complete');
    if (next !== -1) { exState[next].status='open'; openIdx=next; renderExList(); setTimeout(()=>document.querySelector('.ex-open')?.scrollIntoView({behavior:'smooth',block:'nearest'}),60); }
    else { renderExList(); checkAllDone(); }
  } else renderExList();
}
function uncompleteSet(exIdx, st, si) {
  if (si!==st.doneSets-1){showToast('Complete sets in order');return;}
  st.doneSets--; totalSets=Math.max(0,totalSets-1);
  if(exState[exIdx].status==='complete'){exState[exIdx].status='open';openIdx=exIdx;}
  renderExList(); showToast('Set marked incomplete');
}
function checkAllDone() {
  const allDone = exState.every(s => s.status === 'complete');
  if (allDone) showComplete();
}

/* ── Add/Remove exercise ── */
function buildModalList(filter='') {
  const list = document.getElementById('modal-list'); list.innerHTML = '';
  const f = filter.toLowerCase();
  const filtered = LIBRARY.filter(e => (e.name+e.muscle).toLowerCase().includes(f) && !currentPlan.exercises.find(w=>w.id===e.id));
  filtered.forEach(ex => {
    const item = document.createElement('div'); item.className = 'modal-ex-item';
    item.innerHTML = `<div><div class="modal-ex-item__name">${ex.name}</div><div class="modal-ex-item__muscle">${ex.muscle}</div></div><div class="modal-ex-item__add"><svg width="12" height="12" viewBox="0 0 14 14" fill="none"><path d="M7 3v8M3 7h8" stroke="#00FF00" stroke-width="2" stroke-linecap="round"/></svg></div>`;
    item.addEventListener('click', () => {
      const newEx = {id:ex.id,name:ex.name,desc:`${ex.muscle} exercise.`,sets:ex.sets,reps:String(ex.reps),kg:ex.kg};
      currentPlan.exercises.push(newEx);
      exState.push({status:'upcoming',doneSets:0,sets:Array.from({length:ex.sets},()=>({kg:ex.kg||20,reps:ex.reps})),planReps:String(ex.reps)});
      if(lastData[ex.id]===undefined)lastData[ex.id]=null;
      closeModal(); renderExList(); showToast(`${ex.name} added`);
    });
    list.appendChild(item);
  });
  if(!list.children.length) list.innerHTML='<div style="text-align:center;color:var(--muted);padding:32px;font-size:14px">No exercises found</div>';
}
function openModal(){document.getElementById('add-modal').classList.add('show');document.getElementById('modal-search').value='';buildModalList();setTimeout(()=>document.getElementById('modal-search').focus(),300);}
function closeModal(){document.getElementById('add-modal').classList.remove('show');}
document.getElementById('btn-add-ex').addEventListener('click',openModal);
document.getElementById('add-modal').addEventListener('click',e=>{if(e.target===document.getElementById('add-modal'))closeModal();});
document.getElementById('modal-search').addEventListener('input',e=>buildModalList(e.target.value));

document.getElementById('btn-remove-ex').addEventListener('click',()=>{
  if(!currentPlan||currentPlan.exercises.length===0){showToast('No exercises');return;}
  const idx=currentPlan.exercises.length-1;
  if(exState[idx]?.doneSets>0){showToast("Can't remove a started exercise");return;}
  const name=currentPlan.exercises[idx].name;
  if(openIdx===idx)openIdx=null;
  currentPlan.exercises.splice(idx,1);exState.splice(idx,1);
  renderExList();showToast(`${name} removed`);
});

/* ════════════════════════════════════════
   COMPLETE
════════════════════════════════════════ */
function showComplete() {
  clearInterval(timerH); timerH = null; syncPush(false);
  // Use accumulated pausedElapsed + current segment if still running
  const el = workoutPaused ? pausedElapsed : (pausedElapsed + Math.floor((Date.now()-startTime)/1000));
  const vol = currentPlan ? currentPlan.exercises.reduce((a,ex,i)=>a+(exState[i]?.sets.slice(0,exState[i]?.doneSets||0).reduce((b,s)=>b+s.kg*s.reps,0)||0),0) : 0;
  const title = currentPlan?.type==='run' ? 'Run<br>logged.' : currentPlan?.type==='rest' ? 'Rest<br>day ✓' : 'Session<br>complete.';
  document.getElementById('overlay-title').innerHTML = title;
  document.getElementById('stat-time').textContent = fmtTime(el);
  document.getElementById('stat-sets').textContent = totalSets || (runDone?'1':'0');
  document.getElementById('stat-vol').textContent = Math.round(vol).toLocaleString() || '—';
  document.getElementById('overlay').classList.add('show');
}
document.getElementById('done-btn').addEventListener('click',()=>{document.getElementById('overlay').classList.remove('show');if(window.PULSE)window.PULSE.navigate('/home');else window.history.back();});
document.getElementById('btn-back').addEventListener('click',()=>{if(confirm('End this session?')){clearInterval(timerH);timerH=null;if(window.PULSE)window.PULSE.navigate('/home');else window.history.back();}});

/* ════════════════════════════════════════
   SYNC
════════════════════════════════════════ */
let syncUrl=localStorage.getItem('pulse:syncUrl')||'';
let syncKey=localStorage.getItem('pulse:syncKey')||'';
function payload(){
  const progress={},weights={};
  if(currentPlan){currentPlan.exercises.forEach((ex,i)=>{progress[ex.id]=exState[i]?.doneSets||0;weights[ex.id]=exState[i]?.sets.map(s=>s.kg)||[];});}
  return {secret:syncKey,progress,weights,notes:{},runlog:{[new Date().toISOString().slice(0,10)]:runDone?currentPlan?.run?.distance||'done':''},prs:{},wphist:{[new Date().toISOString().slice(0,10)]:currentPlan?.title||''},dismissedNudges:{}};
}
async function syncPush(manual=false){
  if(!syncUrl||!syncKey){if(manual)showToast('Set sync URL & key in settings ···');return;}
  document.getElementById('sync-btn').classList.add('syncing');
  try{const r=await fetch(syncUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload())});const d=await r.json();if(d.success&&manual)showToast('✓ Pushed to Sheets');}
  catch(e){if(manual)showToast('Sync failed — check URL');}
  finally{document.getElementById('sync-btn').classList.remove('syncing');document.getElementById('pull-btn')?.classList.remove('syncing');}
}
async function syncPull(){
  if(!syncUrl||!syncKey){showToast('Set sync URL & key in settings ···');return;}
  document.getElementById('pull-btn').classList.add('syncing');
  try{const r=await fetch(`${syncUrl}?secret=${encodeURIComponent(syncKey)}`);const d=await r.json();if(d.error){showToast('Pull error: '+d.error);return;}if(d.weights&&currentPlan)currentPlan.exercises.forEach((ex,i)=>{if(d.weights[ex.id]&&exState[i])exState[i].sets.forEach((s,si)=>{if(d.weights[ex.id][si]!==undefined)s.kg=d.weights[ex.id][si];});});renderExList();showToast('✓ Pulled from Sheets');}
  catch(e){showToast('Pull failed — check URL');}
  finally{document.getElementById('pull-btn').classList.remove('syncing');}
}
function updateStatus(msg){const b=document.getElementById('sync-status-box');if(b)b.textContent=msg;}
document.getElementById('sync-btn').addEventListener('click',()=>syncPush(true));
document.getElementById('pull-btn').addEventListener('click',syncPull);
document.getElementById('btn-settings').addEventListener('click',()=>{document.getElementById('settings-page').classList.add('show');document.getElementById('setting-url').value=syncUrl;document.getElementById('setting-key').value=syncKey;updateStatus(syncUrl&&syncKey?'Connected ✓ — auto-push active':'Not configured. Add URL and key above.');});
document.getElementById('settings-back').addEventListener('click',()=>document.getElementById('settings-page').classList.remove('show'));
document.getElementById('settings-save').addEventListener('click',()=>{syncUrl=document.getElementById('setting-url').value.trim();syncKey=document.getElementById('setting-key').value.trim();localStorage.setItem('pulse:syncUrl',syncUrl);localStorage.setItem('pulse:syncKey',syncKey);showToast('Settings saved');updateStatus(syncUrl&&syncKey?'Connected ✓':'Not configured.');});

/* ════════════════════════════════════════
   BADGE
════════════════════════════════════════ */
function badgeHTML(ex) {
  const repsLabel = ex.reps === 'AMRAP' ? '∞' : ex.reps || '?';
  const setsLabel = ex.sets;
  return `<div class="pill-badge"><span>${setsLabel}</span><svg class="pill-badge__x" viewBox="0 0 8 8" fill="none"><path d="M7 7L4 4M4 4L1 1M4 4L7 1M4 4L1 7" stroke="#021013" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg><span style="font-size:11px">${repsLabel}</span></div>`;
}

/* ════════════════════════════════════════
   INIT
════════════════════════════════════════ */
renderCalendar();
loadDay(todayDow, today);
initCTA();
