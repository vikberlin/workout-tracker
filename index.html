<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="white-translucent">
<title>Training</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#000000;color:#FFFFFF;font-family:'Inter',sans-serif;min-height:100vh;font-size:16px;font-weight:400}
:root{--accent:#FFC4EC;--accent-yellow:#FFE600;--accent-green-light:#CCFFAA;--bg:#000000;--card:#000000;--card2:rgba(255,255,255,0.08);--card3:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.20);--text:#FFFFFF;--muted:rgba(255,255,255,0.55);--muted-2:rgba(255,255,255,0.35);--glass:rgba(255,255,255,.85);--glass-soft:rgba(255,255,255,.65);--dur-fast:0.22s;--ease-out:cubic-bezier(0.25,0.1,0.25,1)}
@media(prefers-reduced-motion:reduce){:root{--dur-fast:0.01ms}*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
button, .set-btn, .wt-btn, .btm-tab, .date-sel-btn, .date-today-btn, .cal-nav-arr, .sync-btn, .bk-btn, .summary-close, .swap-item, .cal-modal-footer button, .run-check-wrap, .meta-chip, .cal-cell, .prog-week-card{transition:transform var(--dur-fast) var(--ease-out),background var(--dur-fast) var(--ease-out),border-color var(--dur-fast) var(--ease-out),color var(--dur-fast) var(--ease-out),box-shadow var(--dur-fast) var(--ease-out),opacity var(--dur-fast) var(--ease-out)}
button:hover, .set-btn:hover, .wt-btn:hover, .btm-tab:hover, .date-sel-btn:hover, .cal-nav-arr:hover, .sync-btn:hover, .bk-btn:hover, .summary-close:hover, .swap-item:hover, .cal-cell:hover, .prog-week-card:hover{transform:translateY(-1px)}
button:active, .set-btn:active, .wt-btn:active, .btm-tab:active, .bk-btn:active, .date-sel-btn:active, .cal-nav-arr:active, .summary-close:active, .swap-item:active{transform:scale(0.98)}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes popUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.cal-modal-overlay,.swap-modal-overlay,.summary-overlay{animation:fadeIn .24s ease both}
.cal-modal,.swap-modal,.summary-modal{animation:popUp .24s var(--ease-out) both}
input,textarea{font-family:inherit;font-size:16px;background:rgba(255,255,255,0.08);border:1px solid var(--border);color:#FFFFFF;border-radius:16px;padding:14px 16px;width:100%}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.35)}
textarea{resize:vertical;min-height:90px;line-height:1.7}

/* ── HEADER ── */
.hdr{background:transparent;border-bottom:1px dashed var(--border);padding:26px 20px 24px;display:flex;align-items:flex-end;justify-content:space-between;position:relative;z-index:1}
.hdr-title{font-size:12px;color:var(--muted);letter-spacing:.3px;margin-bottom:6px;text-transform:uppercase}
.hdr-name{font-size:33px;line-height:1.05;font-weight:800;letter-spacing:-.04em;color:#FFFFFF}
.hdr-right{display:flex;align-items:center;gap:10px}
.sync-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.10);border:1px solid var(--border);border-radius:999px;padding:10px 16px;font-size:15px;font-weight:700;color:#FFFFFF}
.sync-btn.ok{color:var(--accent);border-color:rgba(0,255,127,0.40)}
.sync-btn.err{color:#ff4a6e;border-color:rgba(255,74,110,0.40)}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{display:inline-block;animation:spin .8s linear infinite}

/* ── TIMER SHEET ── */
.timer-sheet{position:fixed;left:0;right:0;bottom:0;z-index:400;padding:16px 18px calc(80px + env(safe-area-inset-bottom,0px));background:rgba(69, 69, 69, 0.97);backdrop-filter:blur(24px) saturate(140%);border-top:1px solid var(--border);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform var(--dur-fast) var(--ease-out)}
body.timer-on .timer-sheet{transform:translateY(0)}
.timer-sheet-inner{display:flex;flex-direction:column;gap:12px}
.timer-sheet-top{display:flex;align-items:center;justify-content:space-between;gap:12px}
.timer-big{font-size:56px;font-weight:400;color:var(--accent);letter-spacing:-2px;font-variant-numeric:tabular-nums}
.timer-skip{height:100px;width:100%;padding:12px;border-radius:999px;border:1px solid var(--border);background:rgba(255,255,255,0.08);color:#FFFFFF;font-weight:500;font-size:28px}

/* ── NAV ── */
.nav{margin:10px 16px 0;display:flex;gap:6px;background:rgba(255,255,255,0.10);border-radius:999px;padding:6px;border:1px solid var(--border)}
.nav-btn{flex:1;padding:12px 0;border-radius:999px;font-size:14px;font-weight:700;color:var(--muted)}
.nav-btn.active{color:#000;background:var(--accent)}

/* ── PAD ── */
.pad{padding:24px 20px calc(30px + env(safe-area-inset-bottom,0px))}
body.workout-view .pad{padding-top:20px}
body.workout-view.timer-on{padding-bottom:70px)}

/* ── DATE SELECTOR STRIP ── */
.header{display:flex;flex-direction:column;align-items:center;gap:16px;width:100%;margin-bottom:8px}
.date-sel-outer{display:flex;flex-direction:column;gap:12px;width:100%}
.workout-action-btn{width:100%;height:100px;overflow:hidden;border-radius:999px;display:flex;justify-content:space-between;align-items:center;border:none;cursor:pointer;position:relative;-webkit-user-select:none;user-select:none}
.start-btn{padding:8px 8px 8px 32px;background:#FFC4EC}
.pause-btn{padding:8px 8px 8px 32px;background:rgba(255,255,255,0.50)}
.end-btn{padding:8px 32px 8px 8px;background:#833253}
.hold-fill{position:absolute;inset:0;background:rgba(44,0,18,0.22);transform:scaleX(0);transform-origin:left;border-radius:inherit;pointer-events:none}
.workout-btn-label{flex:1;text-align:center;color:#2C0012;font-size:28px;font-weight:400;line-height:1.2}
.end-btn .workout-btn-label{color:#ffffff}
.workout-btn-icon{width:84px;align-self:stretch;padding:16px;background:#2C0012;border-radius:999px;display:flex;justify-content:center;align-items:center;flex-shrink:0}
.workout-action-btn-fixed{position:fixed;top:16px;left:16px;right:16px;height:75px;overflow:hidden;border-radius:999px;display:flex;justify-content:space-between;align-items:center;z-index:200;opacity:0;pointer-events:none;transition:opacity 0.22s ease,transform 0.22s ease;transform:translateY(-8px);border:none;cursor:pointer;padding:8px 8px 8px 71px}
.workout-action-btn-fixed.visible{opacity:1;pointer-events:auto;transform:translateY(0)}
.workout-action-btn-fixed.fixed-pause{background:rgba(255,255,255,0.50);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px)}
.workout-action-btn-fixed.fixed-start{background:#FFC4EC}
.date-sel-btn{width:100%;height:75vh;position:relative;background:#000;overflow:hidden;border-radius:32px;border:0;display:block;text-align:left;cursor:pointer;background-size:cover;background-position:center;background-image:url('../002.jpg')}
.date-sel-content{position:absolute;inset:0;padding:32px;display:flex;flex-direction:column;justify-content:space-between;align-items:stretch}
.back-today-btn{width:100%;height:75px;padding:8px 32px 8px 8px;background:rgba(255,255,255,0.15);overflow:hidden;border-radius:999px;border:none;display:flex;justify-content:space-between;align-items:center;cursor:pointer}
.back-today-icon{width:63px;height:63px;border-radius:999px;background:#ffffff;display:flex;justify-content:center;align-items:center;flex-shrink:0}
.date-sel-main{font-size:28px;font-weight:500;color:#ffffff;line-height:1.2}
.date-sel-label{font-size:56px;font-weight:500;color:#ffffff;line-height:1.2}
.date-sel-sub{font-size:28px;font-weight:500;color:#ffffff;text-align:right;line-height:1.2}
.workout-overview{display:flex;flex-direction:column;align-items:flex-start;gap:0}
.workout-overview-list{color:#ffffff;font-size:16px;font-family:Inter;font-weight:500;line-height:1.3;opacity:0.85}
.date-sel-status{display:inline-flex;align-items:center;justify-content:center;height:44px;padding:0 16px;gap:12px;border-radius:999px;font-size:11px;font-weight:700;letter-spacing:.02em;min-width:0}
.date-sel-status.done{background:rgba(0,255,127,0.15);color:var(--accent);border:1px solid rgba(0,255,127,0.35)}
.date-sel-status.missed{background:rgba(255,74,110,0.18);color:#ff6b88;border:1px solid rgba(255,74,110,0.35)}
.date-sel-status.almost{background:rgba(255,165,0,0.15);color:#ffb347;border:1px solid rgba(255,165,0,0.35)}
.date-sel-status.today{background:rgba(255,255,255,0.12);color:#FFFFFF;border:1px solid rgba(255,255,255,0.25)}
.date-sel-status.upcoming{background:rgba(255,255,255,0.08);color:var(--muted);border:1px solid var(--border)}
.date-sel-status.edge{background:rgba(255,230,0,0.15);color:var(--accent-yellow);border:1px solid rgba(255,230,0,0.35)}

/* ── SESSION & EXERCISE ── */
.session-card{margin-bottom:18px}
.ex-row-w-image-w-swap{display:flex;flex-direction:column;gap:0;margin-bottom:16px}
.ex-row-w-image{border-radius:32px;corner-shape: continuous;overflow:hidden;display:flex;flex-direction:column;margin-bottom:8px}
.ex-row-w-image > .ex-row{border-radius:0;margin-bottom:0}
.ex-img-area{height:250px;background:rgba(255,196,236,0.15);position:relative;display:flex;flex-direction:column;justify-content:flex-end;padding:0 16px 24px}
.ex-img-overlay{display:flex;justify-content:flex-end;align-items:flex-end;gap:8px}
.session-hdr{padding:16px;overflow:hidden;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:16px}
.session-info{align-self:stretch;color:#FFFFFF;font-size:28px;font-weight:500;line-height:1.2}
.ex-row{background:#FFC4EC;border-radius:32px;margin-bottom:16px;padding:16px;display:flex;flex-direction:column;gap:16px}
.ex-hdr{display:flex;align-items:flex-start;justify-content:space-between;gap:4px}
.ex-name{font-size:28px;font-weight:400;color:#2C0012;letter-spacing:-.35px;line-height:1.2}
.ex-name.is-done{text-decoration:line-through;opacity:0.5}
.ex-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-top:4px}
.meta-chip{display:inline-flex;align-items:center;color:#833253;font-size:16px;font-weight:500}
.meta-chip-dot{width:4px;height:4px;border-radius:50%;background:#833253;display:inline-block;flex-shrink:0}
.ex-controls{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-top:4px}
.wt-row{display:flex;align-items:center}
.wt-btn{width:46px;height:40px;background:#FFC4EC;border:none;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;color:#833253;cursor:pointer;transition:background var(--dur-fast)}
.wt-btn:hover{background:rgba(131,50,83,0.15)}
.wt-row .wt-btn:first-child{border-radius:100px 0 0 100px}
.wt-row .wt-btn:last-child{border-radius:0 100px 100px 0}
.wt-val{height:40px;padding:0 12px;background:#FFC4EC;border-left:1px solid #833253;border-right:1px solid #833253;display:flex;align-items:center;justify-content:center;color:#833253;font-size:16px;font-weight:500;min-width:90px}
.ex-reps-label{color:#FFFFFF;font-size:16px;font-weight:500;margin-bottom:8px}
.sets-row{display:flex;flex-direction:row;gap:8px;width:100%}
.set-btn{flex:1;max-width:67px;height:150px;padding:16px;border-radius:16px;corner-shape: continuous;border:none;background:rgba(255,255,255,0.50);display:flex;flex-direction:column;justify-content:flex-start;align-items:center;gap:10px;cursor:pointer;touch-action:pan-y;transition:background var(--dur-fast) var(--ease-out),transform var(--dur-fast);min-width:0}
.set-btn.is-done{background:rgba(131,50,83,0.50);justify-content:space-between}
.set-btn:active{transform:scale(0.97)}
.set-num{font-size:24px;font-weight:400;color:#833253;line-height:1}
.set-btn.is-done .set-num{color:#FFFFFF}
.swap-pill-wrap{display:flex;justify-content:center;padding:4px 0 8px;gap:8px; margin-bottom:16px; margin-top:-16px}
.swap-pill{padding:8px 16px;background:#ffffff1c;border-radius:999px;border:none;color:rgba(255,196,236,0.8);font-size:16px;font-weight:500;cursor:pointer;transition:transform var(--dur-fast),background var(--dur-fast)}
.swap-pill:hover{background:rgba(255,196,236,0.8)}
.restore-pill{padding:8px 16px;background:rgba(255,74,110,0.12);border-radius:999px;border:1px solid rgba(255,74,110,0.30);color:#ff4a6e;font-size:16px;font-weight:500;cursor:pointer;transition:transform var(--dur-fast)}
.restore-pill:active{transform:scale(0.97)}
.cb{width:24px;height:24px;border-radius:999px;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cb.done{}
.run-check-wrap{display:flex;align-items:center;justify-content:center;width:32px;height:32px;cursor:pointer;flex-shrink:0}
.chk-svg{display:block}

/* ── RUN LOG ENTRY ── */
.run-log-fields{display:flex;gap:8px;align-items:center}
.run-log-field{display:flex;flex-direction:column;gap:8px;flex:1}
.run-log-field label{font-size:16px;font-weight:500;color:#FFFFFF}
.run-log-field input{height:50px;padding:0 16px;font-size:24px;font-weight:400;font-family:inherit;border-radius:16px;border:none;background:rgba(255,255,255,0.50);color:#833253;width:100%}
.run-log-field input::placeholder{color:rgba(131,50,83,0.45)}
.run-check-wrap{display:flex;align-items:center;justify-content:center;width:44px;height:44px;cursor:pointer;flex-shrink:0;background:rgba(131,50,83,0.50);border-radius:999px}

/* ── SWAP MODAL ── */
.swap-modal-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.7);display:flex;align-items:flex-end;justify-content:center}
.swap-modal{width:100%;max-width:430px;background:#000000;backdrop-filter:blur(24px);border-radius:24px 24px 0 0;padding:0 0 env(safe-area-inset-bottom,20px);border-top:1px solid var(--border);max-height:70vh;overflow-y:auto}
.swap-modal-hdr{padding:16px 20px 12px;border-bottom:1px dashed var(--border);position:sticky;top:0;background:#000000;backdrop-filter:blur(12px)}
.swap-modal-hdr h3{font-size:17px;font-weight:700;color:#FFFFFF}
.swap-modal-hdr p{font-size:12px;color:var(--muted);margin-top:3px}
.swap-item{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px dashed var(--border);cursor:pointer;transition:background .15s}
.swap-item:hover{background:rgba(255,255,255,0.06)}
.swap-item:last-child{border-bottom:none}
.swap-item-name{font-size:15px;font-weight:600;color:#FFFFFF}
.swap-item-meta{font-size:12px;color:var(--muted);margin-top:2px}
.swap-cancel{width:100%;padding:14px;font-size:15px;font-weight:600;color:var(--muted);border-top:1px dashed var(--border);text-align:center}

/* ── SUMMARY MODAL ── */
.summary-overlay{position:fixed;inset:0;z-index:600;background:rgba(0,0,0,.75);display:flex;align-items:flex-end;justify-content:center}
.summary-modal{width:100%;max-width:430px;background:#000000;backdrop-filter:blur(28px) saturate(140%);border-radius:24px 24px 0 0;padding:24px 20px calc(env(safe-area-inset-bottom,0px) + 24px);border-top:1px solid var(--border)}
.summary-emoji{font-size:48px;text-align:center;margin-bottom:12px}
.summary-title{font-size:24px;font-weight:800;text-align:center;letter-spacing:-.5px;margin-bottom:4px;color:#FFFFFF}
.summary-sub{font-size:14px;color:var(--muted);text-align:center;margin-bottom:24px}
.summary-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:20px}
.summary-stat{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:14px 10px;text-align:center}
.summary-stat-val{font-size:20px;font-weight:800;color:var(--accent)}
.summary-stat-lbl{font-size:10px;color:var(--muted);margin-top:3px;text-transform:uppercase;letter-spacing:.5px}
.summary-prs{background:rgba(255,230,0,0.08);border:1px solid rgba(255,230,0,0.25);border-radius:20px;padding:12px 14px;margin-bottom:16px}
.summary-prs-title{font-size:11px;font-weight:700;color:var(--accent-yellow);text-transform:uppercase;letter-spacing:.8px;margin-bottom:8px}
.summary-pr-item{font-size:13px;color:rgba(255,255,255,0.80);padding:3px 0}
.summary-close{width:100%;padding:14px;border-radius:999px;background:#000;color:#FFFFFF;font-size:16px;font-weight:700;border:none;cursor:pointer}

/* ── PR BADGE ── */
.pr-flash{display:inline-flex;align-items:center;justify-content:center;height:40px;padding:0 14px;background:rgba(131,50,83,0.50);border-radius:999px;font-size:16px;font-weight:500;color:#FFFFFF}

/* ── NOTES ── */
.notes-block{margin:0 0 120px;padding:16px 16px;border-radius:32px;border:1px solid var(--border)}
.notes-block textarea{margin-top:6px;font-size:16px;line-height:1.5;background:rgba(255,255,255,0.05);border-color:var(--border)}
.notes-label{padding:0 0 8px 0;font-size:16px;font-weight:400;color:var(--muted)}

/* ── VOLUME CHART ── */
.vol-chart-wrap{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:18px}
.vol-chart-title{font-size:13px;font-weight:800;margin-bottom:14px;color:var(--muted)}
.vol-bars{display:flex;align-items:flex-end;gap:8px;height:90px}
.vol-bar-col{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
.vol-bar-inner{width:100%;display:flex;align-items:flex-end;height:72px}
.vol-bar{width:100%;border-radius:8px 8px 0 0;min-height:4px;background:rgba(255,255,255,0.25);transition:height .3s}
.vol-bar.cur{background:var(--accent)}
.vol-bar-lbl{font-size:10px;color:var(--muted)}

/* ── PROGRESS TAB ── */
.prog-month-section{margin-bottom:24px}
.prog-month-title{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:10px;padding:0 2px}
.prog-week-card{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:18px 20px;margin-bottom:14px;cursor:pointer}
.prog-week-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.prog-week-label{font-size:16px;font-weight:600;color:#FFFFFF}
.prog-week-pct{font-size:16px;font-weight:700;color:var(--accent)}
.prog-week-pct.zero{color:var(--muted)}
.prog-bar-bg{width:100%;height:10px;background:rgba(255,255,255,0.18);border-radius:999px;overflow:hidden}
.prog-bar-fill{height:100%;border-radius:999px;background:var(--accent);transition:width .4s}
.prog-week-days{display:flex;gap:4px;margin-top:10px}
.prog-day-pip{flex:1;height:4px;border-radius:999px;background:rgba(255,255,255,0.18)}
.prog-day-pip.done{background:var(--accent)}
.prog-day-pip.partial{background:rgba(0,255,127,0.45)}
.stat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:18px 16px;text-align:center}
.stat-val{font-size:clamp(1.15rem,3.5vw + .4rem,1.45rem);font-weight:800;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.4}

/* ── BACKUP TAB ── */
.bk-section{background:rgba(255,255,255,0.06);border:1px solid var(--border);border-radius:20px;padding:18px;margin-bottom:16px}
.bk-section h3{font-size:17px;font-weight:700;margin-bottom:12px;color:#FFFFFF}
.bk-btns{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}
.bk-btn{flex:1;min-width:120px;padding:12px 14px;border-radius:999px;font-size:15px;font-weight:700;border:1px solid var(--border);text-align:center;cursor:pointer}
.bk-green{background:#000;border-color:rgba(0,255,127,0.30);color:#FFFFFF}
.bk-neutral{background:rgba(255,255,255,0.08);border-color:var(--border);color:#FFFFFF}
.bk-red{background:rgba(255,74,110,0.12);border-color:rgba(255,74,110,0.30);color:#ff4a6e}
.sh-label{font-size:14px;color:var(--muted);margin-bottom:4px;margin-top:10px}
.sh-save{width:100%;padding:13px;border-radius:999px;background:#000;border:none;font-size:17px;font-weight:700;color:#FFFFFF;margin-top:12px;cursor:pointer}
.sync-row{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);margin-top:8px}
.sdot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.20)}
.sdot.on{background:var(--accent)}

/* ── CAL MODAL ── */

/* ── BOTTOM TAB BAR ── */
.btm-tabbar-wrap{position:fixed;left:0;right:0;bottom:0;z-index:320;display:flex;justify-content:center;pointer-events:none;padding:0 18px calc(env(safe-area-inset-bottom,0px) + 16px)}

/* ── NOTIFICATION BANNER ── */

<body>
<div id="app"></div>
<script>
const SK='tr_prog_v5',WK='tr_wts_v5',CK='tr_cfg_v5',NK='tr_notes_v1',RLK='tr_runs_v1',PRK='tr_prs_v1',SWK='tr_swaps_v1',WPHK='tr_wphist_v1',DNK='tr_dismissed_v1';

const PROGRAM_START = new Date(2026, 3, 14);

// ── EXERCISE SWAPS ────────────────────────────────────────────
const SWAPS = {
  'Barbell Squats':      [{n:'Goblet Squat',bw:0},{n:'Leg Press',bw:0},{n:'Hack Squat',bw:0}],
  'Bulgarian Split Squats':[{n:'Reverse Lunges',bw:0},{n:'Step-Ups',bw:0},{n:'Single-Leg Press',bw:0}],
  'Romanian Deadlift':   [{n:'Stiff-Leg Deadlift',bw:0},{n:'Nordic Curl',bw:1},{n:'Dumbbell RDL',bw:0}],
  'Barbell Bench Press': [{n:'DB Flat Press',bw:0},{n:'Push-Ups',bw:1},{n:'Smith Machine Press',bw:0}],
  'Incline Barbell Press':[{n:'Incline DB Press',bw:0},{n:'Cable Fly High-Low',bw:0}],
  'Barbell Overhead Press':[{n:'Seated DB Press',bw:0},{n:'Arnold Press',bw:0},{n:'Landmine Press',bw:0}],
  'Barbell Row':         [{n:'Single Arm DB Row',bw:0},{n:'Machine Row',bw:0},{n:'Chest-Supported Row',bw:0}],
  'Pull-Ups':            [{n:'Lat Pulldown',bw:0},{n:'Assisted Pull-Ups',bw:0},{n:'Band Pull-Ups',bw:1}],
  'Skull Crushers':      [{n:'Overhead Cable Extension',bw:0},{n:'DB Tricep Extension',bw:0}],
  'Leg Press':           [{n:'Hack Squat',bw:0},{n:'Goblet Squat',bw:0}],
  'Cable Chest Fly':     [{n:'DB Fly',bw:0},{n:'Pec Deck',bw:0}],
  'Low Cable Row':       [{n:'Machine Row',bw:0},{n:'Seated Band Row',bw:1}],
  'Lat Pulldown':        [{n:'Pull-Ups',bw:1},{n:'Straight-Arm Pulldown',bw:0}],
};

// ── BUILD WEEK ────────────────────────────────────────────────
function bw(w){
  const dld=w===16,pk=w>=13&&w<=15,it=w>=9&&w<=12,vl=w>=5&&w<=8;
  const s=b=>dld?Math.max(2,b-1):pk?b+2:it?b+1:vl?b+1:b;
  const r=(a,b)=>`${a}–${b}`;
  const re=dld?4:pk?7:it?6.5:vl?5.5:5;
  const rl=dld?'45–60 min easy':pk?'100–120 min easy':it?'90–100 min easy':vl?'75–90 min easy':'60–90 min easy';
  const sm=dld?5:pk?8:it?7:vl?6.5:6;
  const rp=dld?6:pk?10:it?9:vl?8:8;
  const pu=dld?75:pk?150:it?125:vl?110:100;
  const pl=dld?35:pk?75:it?65:vl?55:50;
  const pr=pk?'4–6':'6–8';const sq=pk?'3–5':it?'4–5':'5';
  const odd=w%2!==0;
  const sd=odd?`${sm} km — 1km warm-up · ${rp}× 800m repeats (90s rest) · 1km cool-down`:`${sm} km — 1km warm-up · 4km negative splits (each km faster) · 1km cool-down`;
  const mon=odd?[{n:'Leg Extensions',s:s(5),r:r(10,12)},{n:'Leg Curls',s:s(5),r:r(10,12)},{n:'Bulgarian Split Squats',s:s(3),r:r(10,12)},{n:'Barbell Squats',s:s(5),r:sq},{n:'Walking Barbell Lunges',s:s(4),r:'20 (10 each)'}]:[{n:'Leg Extensions',s:s(4),r:r(10,12)},{n:'Leg Curls',s:s(4),r:r(10,12)},{n:'Dumbbell Romanian Deadlift',s:s(3),r:r(10,12)},{n:'Back Squat',s:s(4),r:pk?'5–6':it?'6–8':'8–10'},{n:'Walking Barbell Lunges',s:s(3),r:'20 (10 each)'},{n:'Weighted Back Extensions',s:s(3),r:r(10,15)}];
  const tue=odd?[{n:`${pu} Push-Ups`,s:1,r:'total',bw:1},{n:`${pl} Pull-Ups`,s:1,r:'total',bw:1},{n:'DB Lateral Raise',s:s(5),r:r(12,15)},{n:'Rear Delt Fly',s:s(3),r:r(12,15)},{n:'Barbell Overhead Press',s:s(4),r:pr},{n:'Front Plate Raises',s:s(4),r:r(12,15)},{n:'Seated DB Shoulder Press',s:s(3),r:r(10,12)},{n:'DB Bicep Curl',s:s(3),r:'10',ss:'SS1'},{n:'Bodyweight Dips',s:s(3),r:'AMRAP',ss:'SS1',bw:1},{n:'Tricep Pushdown',s:s(3),r:'15',ss:'SS2'},{n:'Barbell Curl',s:s(3),r:'10',ss:'SS2'}]:[{n:`${pl} Pull-Ups`,s:1,r:'total',bw:1},{n:'DB Lateral Raise',s:s(5),r:r(12,15)},{n:'Cable Face Pulls',s:s(3),r:r(12,15)},{n:'Barbell Overhead Press',s:s(4),r:pr},{n:'Upright Rows',s:s(4),r:r(12,15)},{n:`${pu} Push-Ups`,s:1,r:'total',bw:1},{n:'DB Hammer Curl',s:s(3),r:'10',ss:'SS1'},{n:'Bodyweight Dips',s:s(3),r:'AMRAP',ss:'SS1',bw:1},{n:'Tricep Straight Bar Pushdown',s:s(3),r:'15',ss:'SS2'},{n:'Barbell Curl',s:s(3),r:'10',ss:'SS2'}];
  const wed=odd?[{n:'Pull-Ups',s:s(5),r:'AMRAP',bw:1},{n:'Low Cable Row',s:s(4),r:r(10,12)},{n:'Lat Pulldown',s:s(4),r:r(10,12)},{n:'Barbell Row',s:s(3),r:r(8,10)},{n:'Cable Pull-Throughs',s:s(4),r:r(12,15)},{n:'Back Extensions',s:s(3),r:'15',bw:1},{n:'Hammer Curls',s:s(4),r:r(12,15)},{n:'Chin-Ups',s:s(4),r:'AMRAP',bw:1}]:[{n:'Pull-Ups',s:s(5),r:'AMRAP',bw:1},{n:'Low Cable Row',s:s(4),r:r(10,12)},{n:'Lat Pulldown',s:s(4),r:r(10,12)},{n:'Single Arm DB Row',s:s(3),r:r(8,10)},{n:'Cable Pull-Throughs',s:s(4),r:r(12,15)},{n:'KB Swings',s:s(3),r:r(15,20)},{n:'Dumbbell Bicep Curl',s:s(4),r:r(12,15)},{n:'Chin-Ups',s:s(4),r:'AMRAP',bw:1}];
  const thu=odd?[{n:`${pu} Push-Ups`,s:1,r:'total',bw:1},{n:'Cable Chest Fly',s:s(5),r:r(10,12)},{n:'Incline Barbell Press',s:s(4),r:pr},{n:'Flat DB Chest Press',s:s(4),r:r(10,12)},{n:'Bodyweight Dips',s:s(3),r:'AMRAP',bw:1},{n:'Skull Crushers',s:s(3),r:r(10,12)},{n:'Overhead DB Tricep Ext.',s:s(3),r:r(12,15)}]:[{n:`${pu} Push-Ups`,s:1,r:'total',bw:1},{n:'Cable Chest Fly',s:s(5),r:r(10,12)},{n:'Barbell Bench Press',s:s(4),r:pr},{n:'Bodyweight Dips',s:s(4),r:'AMRAP',bw:1},{n:'Incline DB Bench Press',s:s(4),r:r(10,12)},{n:'Skull Crushers',s:s(3),r:r(10,12)},{n:'Overhead DB Tricep Ext.',s:s(3),r:r(12,15)}];
  const fri=odd?[{n:'Leg Extensions',s:s(4),r:r(10,12)},{n:'Reverse DB Lunges',s:s(4),r:r(10,12)},{n:'Romanian Deadlift',s:s(4),r:r(8,10)},{n:'Leg Press',s:s(4),r:r(10,12)},{n:'Leg Curl',s:s(4),r:r(12,15)},{n:'Calf Raises',s:s(3),r:r(15,20)}]:[{n:'Leg Extensions',s:s(4),r:r(10,12)},{n:'Sissy Squats',s:s(3),r:'AMRAP',bw:1},{n:'Hamstring Curl',s:s(4),r:r(12,15)},{n:'Bulgarian Split Squat',s:s(4),r:r(8,10)},{n:'Leg Press',s:s(5),r:r(10,12)},{n:'Calf Raises',s:s(3),r:r(15,20)}];
  return{days:[
    {name:'Monday',   label:'Run + Lower Body',   sessions:[{type:'run',name:'Morning Run',detail:`${re}-mile easy aerobic run`},{type:'strength',name:'Lower Body',exercises:mon}]},
    {name:'Tuesday',  label:'Shoulders & Arms',   sessions:[{type:'strength',name:'Shoulders & Arms',exercises:tue}]},
    {name:'Wednesday',label:'Run + Back & Biceps',sessions:[{type:'run',name:'Speed Workout',detail:sd},{type:'strength',name:'Back & Biceps',exercises:wed}]},
    {name:'Thursday', label:'Chest & Triceps',    sessions:[{type:'strength',name:'Chest & Triceps',exercises:thu}]},
    {name:'Friday',   label:'Run + Lower Body',   sessions:[{type:'run',name:'Morning Run',detail:`${re}-mile easy aerobic run`},{type:'strength',name:'Lower Body',exercises:fri}]},
    {name:'Saturday', label:'Long Run',           sessions:[{type:'run',name:'Long Run',detail:rl}]},
    {name:'Sunday',   label:'Rest & Recovery',    sessions:[{type:'rest',name:'Active Recovery',detail:'Foam rolling · stretching · yoga · optional walk'}]},
  ]};
}

// ── WEIGHTS ───────────────────────────────────────────────────
const DW={'Leg Extensions':40,'Leg Curls':35,'Bulgarian Split Squats':0,'Barbell Squats':135,'Walking Barbell Lunges':45,'Dumbbell Romanian Deadlift':50,'Back Squat':155,'Weighted Back Extensions':25,'DB Lateral Raise':20,'Rear Delt Fly':15,'Barbell Overhead Press':95,'Front Plate Raises':25,'Seated DB Shoulder Press':40,'Cable Face Pulls':40,'Upright Rows':75,'DB Bicep Curl':30,'DB Hammer Curl':32,'Tricep Pushdown':40,'Tricep Straight Bar Pushdown':45,'Barbell Curl':55,'Pull-Ups':0,'Chin-Ups':0,'Back Extensions':0,'Bodyweight Dips':0,'Sissy Squats':0,'Low Cable Row':120,'Lat Pulldown':110,'Barbell Row':135,'Single Arm DB Row':70,'Cable Pull-Throughs':50,'Hammer Curls':30,'KB Swings':53,'Dumbbell Bicep Curl':32,'Cable Chest Fly':30,'Incline Barbell Press':135,'Flat DB Chest Press':60,'Barbell Bench Press':155,'Incline DB Bench Press':65,'Skull Crushers':65,'Overhead DB Tricep Ext.':40,'Leg Press':270,'Leg Curl':0,'Hamstring Curl':0,'Calf Raises':0,'Romanian Deadlift':155,'Reverse DB Lunges':30,'Bulgarian Split Squat':30};
const PROG={'Barbell Squats':5,'Back Squat':5,'Barbell Bench Press':5,'Incline Barbell Press':5,'Barbell Overhead Press':2.5,'Barbell Row':5,'Low Cable Row':2.5,'Lat Pulldown':2.5,'Leg Press':5,'Romanian Deadlift':5,'Dumbbell Romanian Deadlift':2.5,'Flat DB Chest Press':2.5,'Incline DB Bench Press':2.5,'Skull Crushers':2.5,'DB Lateral Raise':1.25,'Hammer Curls':1.25,'DB Hammer Curl':1.25,'DB Bicep Curl':1.25,'Dumbbell Bicep Curl':1.25,'Barbell Curl':2.5,'Overhead DB Tricep Ext.':1.25,'Cable Chest Fly':1.25,'KB Swings':2.5};
function sugWt(name,week){const base=DW[name];if(base===undefined||base===0)return null;return base+(PROG[name]||0)*Math.floor((week-1)/2);}

// ── DATE HELPERS ──────────────────────────────────────────────
function dateToProgram(date){const d=new Date(date);d.setHours(0,0,0,0);const start=new Date(PROGRAM_START);start.setHours(0,0,0,0);const diff=Math.floor((d-start)/86400000);if(diff<0||diff>=16*7)return null;return{week:Math.floor(diff/7)+1,dayIdx:diff%7};}
function programToDate(week,dayIdx){const d=new Date(PROGRAM_START);d.setDate(d.getDate()+(week-1)*7+dayIdx);return d;}
function fmtDate(d){return d.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});}
function fmtMonthYear(d){return d.toLocaleDateString('en-US',{month:'long',year:'numeric'});}
function todayKey(){return new Date().toISOString().split('T')[0];}
function dateKey(d){return d.toISOString().split('T')[0];}

// ── STATE ─────────────────────────────────────────────────────

function getW(name,week){return WTS[name]!==undefined?WTS[name]:sugWt(name,week);}

// ── PROGRESS ──────────────────────────────────────────────────
function dayComp(w,di){
  const d=bw(w).days[di];if(d.sessions[0]?.type==='rest')return 100;
  let t=0,dn=0;const ch=ST.progress[`${w}-${di}`]||{};
  d.sessions.forEach((s,si)=>{if(s.exercises)s.exercises.forEach((ex,ei)=>{for(let i=0;i<ex.s;i++){t++;if(ch[`${si}-${ei}-${i}`])dn++;}});else{t++;if(ch[`run-${si}`])dn++;}});
  return t>0?Math.round(dn/t*100):0;
}
function weekComp(w){let t=0,d=0;bw(w).days.forEach((_,di)=>{if(bw(w).days[di].sessions[0]?.type==='rest')return;t+=100;d+=dayComp(w,di);});return t>0?Math.round(d/t):0;}

// ── VOLUME CALC ───────────────────────────────────────────────
function calcVolume(w,di){
  let vol=0;
  const ch=ST.progress[`${w}-${di}`]||{};
  bw(w).days[di].sessions.forEach((s,si)=>{
    if(!s.exercises)return;
    s.exercises.forEach((ex,ei)=>{
      if(ex.bw)return;
      const wt=WTS[ex.n]!==undefined?WTS[ex.n]:(sugWt(ex.n,w)||0);
      if(!wt)return;
      for(let i=0;i<ex.s;i++){if(ch[`${si}-${ei}-${i}`]){const reps=parseInt(ex.r)||10;vol+=wt*reps;}}
    });
  });
  return vol;
}
function calcWeekVolume(w){let v=0;bw(w).days.forEach((_,di)=>v+=calcVolume(w,di));return v;}

// ── PR TRACKER ────────────────────────────────────────────────
function checkAndSetPR(name,weight){
  if(!weight||weight<=0)return false;
  const cur=PRS[name]||0;
  if(weight>cur){PRS[name]=weight;sv();return true;}
  return false;
}

// ── PROGRESSION NUDGE ─────────────────────────────────────────
function recordPerf(exName,weight,sets,reps,week,dayIdx){
  if(!weight||weight<=0)return;
  const dayId=`${week}-${dayIdx}`;
  if(!WPHIST[exName])WPHIST[exName]=[];
  const already=WPHIST[exName].some(e=>e.dayId===dayId&&e.weight===weight&&e.sets===sets);
  if(!already){WPHIST[exName].push({dayId,weight,sets,reps,ts:Date.now()});}
  sv();
}
function getNudge(exName,weight,sets,reps){
  if(!weight||weight<=0)return null;
  const nudgeKey=`${exName}|${weight}|${sets}`;
  if(DISMISSED_NUDGES[nudgeKey])return null;
  const hist=WPHIST[exName]||[];
  const matches=hist.filter(e=>e.weight===weight&&e.sets===sets);
  const distinctDays=new Set(matches.map(e=>e.dayId)).size;
  if(distinctDays<3)return null;
  const step=PROG[exName]||2.5;
  return{exName,weight,sets,reps,distinctDays,nextWeight:+(weight+step).toFixed(2),nudgeKey};
}
function checkExerciseComplete(exName,weight,sets,reps,week,dayIdx){
  if(!weight||weight<=0)return;
  recordPerf(exName,weight,sets,reps,week,dayIdx);
}
window.dismissNudge=(nudgeKey,e)=>{
  e.stopPropagation();
  DISMISSED_NUDGES[nudgeKey]=true;
  sv();render();
};
function getActiveNudges(){
  const nudges=[];const seen=new Set();
  Object.entries(WPHIST).forEach(([exName,entries])=>{
    if(!entries.length)return;
    const groups={};
    entries.forEach(e=>{const k=`${e.weight}|${e.sets}`;if(!groups[k])groups[k]=[];groups[k].push(e);});
    Object.entries(groups).forEach(([k,arr])=>{
      const{weight,sets,reps}=arr[0];
      const nudge=getNudge(exName,weight,sets,reps);
      if(nudge&&!seen.has(nudge.nudgeKey)){seen.add(nudge.nudgeKey);nudges.push(nudge);}
    });
  });
  return nudges;
}

function getDayScheduleStatus(week,dayIdx){
  const viewDate=new Date(programToDate(week,dayIdx));viewDate.setHours(0,0,0,0);
  const today=new Date();today.setHours(0,0,0,0);
  const inP=dateToProgram(viewDate);
  if(!inP)return{cls:'edge',label:'Outside program'};
  const comp=dayComp(week,dayIdx);
  const diff=(viewDate-today)/86400000;
  if(diff<0){
    if(comp>=100)return{cls:'done',label:'Done'};
    if(comp>0)return{cls:'almost',label:'Almost complete'};
    return{cls:'missed',label:'Missed'};
  }
  if(diff===0){if(comp>=100)return{cls:'done',label:'Today · done'};return{cls:'today',label:'Today'};}
  return{cls:'upcoming',label:'Upcoming'};
}

function playBeep(){if(!ST.timerSound)return;try{const C=window.AudioContext||window.webkitAudioContext;if(!C)return;beepCtx=beepCtx||new C();const o=beepCtx.createOscillator(),g=beepCtx.createGain();o.connect(g);g.connect(beepCtx.destination);o.frequency.value=880;g.gain.value=.045;o.start();o.stop(beepCtx.currentTime+.07);}catch{}}

// ── ELAPSED TICKER ────────────────────────────────────────────
let ELTICK=null;
function calcElapsedMs(){
  if(!ST.workoutStartTime)return 0;
  let elapsed=Date.now()-ST.workoutStartTime-(ST.pausedDuration||0);
  if(ST.workoutPaused&&ST.pauseStartTime)elapsed-=(Date.now()-ST.pauseStartTime);
  return Math.max(0,elapsed);
}
function startElapsedTick(){
  if(ELTICK)return;
  ELTICK=setInterval(()=>{
    if(ST.workoutPaused)return;
    const t=fmtElapsed();
    const el=document.getElementById('workout-elapsed');
    if(el&&ST.workoutStartTime)el.textContent=t;
    const elF=document.getElementById('workout-elapsed-fixed');
    if(elF&&ST.workoutStartTime)elF.textContent=t;
  },1000);
}
function stopElapsedTick(){if(ELTICK){clearInterval(ELTICK);ELTICK=null;}}
function fmtElapsed(){
  const secs=Math.floor(calcElapsedMs()/1000);
  return`${Math.floor(secs/60)}:${String(secs%60).padStart(2,'0')}`;
}

// ── PARTICLES ─────────────────────────────────────────────────
function genParticles(){
  const rings=[{n:7,r:50,sz:14},{n:11,r:95,sz:9},{n:14,r:132,sz:6},{n:5,r:25,sz:5}];
  let h='';
  rings.forEach(ring=>{
    for(let i=0;i<ring.n;i++){
      const sa=((i/ring.n)*360).toFixed(1);
      const dur=(5+Math.random()*5).toFixed(1);
      const dl=(-(Math.random()*parseFloat(dur))).toFixed(1);
      const op=(0.35+Math.random()*0.65).toFixed(2);
      const m=-(ring.sz/2).toFixed(1);
      h+=`<div class="sp" style="--sa:${sa}deg;--r:${ring.r}px;--d:${dur}s;--dl:${dl}s;width:${ring.sz}px;height:${ring.sz}px;margin:${m}px 0 0 ${m}px;opacity:${op}"></div>`;
    }
  });
  return h;
}

function openCal(){const d=programToDate(ST.week,ST.dayIdx);ST.calOpen=true;ST.calViewMonth=new Date(d.getFullYear(),d.getMonth(),1);ST.calTempWeek=ST.week;ST.calTempDay=ST.dayIdx;render();}

function renderCalModal(){
  const overlay=document.getElementById('cal-overlay');if(!overlay)return;
  const mv=ST.calViewMonth,year=mv.getFullYear(),month=mv.getMonth();
  const offset=new Date(year,month,1).getDay();

  const today=new Date();today.setHours(0,0,0,0);
  const tempDate=programToDate(ST.calTempWeek,ST.calTempDay);tempDate.setHours(0,0,0,0);

  let html=`<div class="cal-modal-hdr"><div class="cal-modal-title">Select date</div><div class="cal-modal-selected">${fmtDate(tempDate)}</div><div style="font-size:12px;color:var(--muted);margin-top:2px">W${ST.calTempWeek} · ${selDay.label}</div></div>

  <div class="cal-grid">`;
  for(let i=0;i<offset;i++)html+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const cellDate=new Date(year,month,day);cellDate.setHours(0,0,0,0);
    const prog=dateToProgram(cellDate);const isInProg=prog!==null;
    const isSelected=cellDate.getTime()===tempDate.getTime();
    const isToday=cellDate.getTime()===today.getTime();
    const hasProgress=isInProg&&dayComp(prog.week,prog.dayIdx)>0;
    let cls='cal-cell'+(isInProg?' in-program':'')+(isSelected?' selected':'')+(isToday&&!isSelected?' today-marker':'')+(hasProgress&&!isSelected?' has-progress':'');
    html+=`<div class="${cls}" ${isInProg?`onclick="calClickDate(${prog.week},${prog.dayIdx})"`:''}>${day}</div>`;
  }
  html+=`</div><div class="cal-modal-footer"><button class="cal-cancel-btn" onclick="calCancel()">Cancel</button><button class="cal-ok-btn" onclick="calConfirm()">OK</button></div>`;
  overlay.innerHTML=`<div class="cal-modal" onclick="event.stopPropagation()">${html}</div>`;
}

// ── SYNC ──────────────────────────────────────────────────────
async function syncPush(){if(!CFG.url||!CFG.key)return;try{await fetch(CFG.url,{method:'POST',mode:'no-cors',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'push',secret:CFG.key,ts:new Date().toISOString(),progress:ST.progress,weights:WTS,notes:NOTES,runlog:RUNLOG,prs:PRS,wphist:WPHIST,dismissedNudges:DISMISSED_NUDGES})});}catch{}}
async function syncPull(){
  if(!CFG.url||!CFG.key){alert('Connect Google Sheets first in Settings.');return;}
  ST.syncStatus='syncing';renderSyncBtn();
  try{
    const res=await fetch(CFG.url+'?action=pull&secret='+encodeURIComponent(CFG.key));
    if(!res.ok)throw new Error('HTTP '+res.status);
    const data=await res.json();if(data.error)throw new Error(data.error);
    if(data.progress)ST.progress={...ST.progress,...data.progress};
    if(data.weights)WTS={...WTS,...data.weights};
    if(data.notes)NOTES={...NOTES,...data.notes};
    if(data.runlog)RUNLOG={...RUNLOG,...data.runlog};
    if(data.prs)PRS={...PRS,...data.prs};
    if(data.wphist){Object.keys(data.wphist).forEach(k=>{WPHIST[k]=[...new Map([...(WPHIST[k]||[]),...(data.wphist[k]||[])].map(e=>[e.dayId+e.weight+e.sets,e])).values()];});}
    if(data.dismissedNudges)DISMISSED_NUDGES={...DISMISSED_NUDGES,...data.dismissedNudges};
    sv();ST.syncStatus='ok';renderSyncBtn();setTimeout(()=>{ST.syncStatus='idle';renderSyncBtn();},3000);render();
  }catch{ST.syncStatus='err';renderSyncBtn();setTimeout(()=>{ST.syncStatus='idle';renderSyncBtn();},4000);}
}
function renderSyncBtn(){
  const el=document.getElementById('sync-btn');if(!el)return;
  if(ST.syncStatus==='syncing'){el.className='sync-btn ok';el.innerHTML='<span class="spin">↻</span> Syncing...';}
  else if(ST.syncStatus==='ok'){el.className='sync-btn ok';el.innerHTML='✓ Synced';}
  else if(ST.syncStatus==='err'){el.className='sync-btn err';el.innerHTML='⚠ Failed';}
  else el.innerHTML='↻ Sync';
}

      if(ses.exercises){
        ses.exercises.forEach((ex,ei)=>{

          const ad=ds===ex.s;
          const wt=ex.bw?null:getW(displayName,ST.week);
          const isPR=wt&&wt>=(PRS[displayName]||0)&&wt>0&&(PRS[displayName]>0);
          const hasSwaps=SWAPS[origName]&&SWAPS[origName].length>0;
          h+=`<div class="ex-row-w-image-w-swap" style="${ad?'opacity:0.75':''}"><div class="ex-row-w-image">
            <div class="ex-img-area">
              <div class="ex-img-overlay">
                ${isPR?`<span class="pr-flash">PR!</span>`:''}
                ${!ex.bw&&wt!==null?`<div class="wt-row"><button class="wt-btn" onclick="adjWt('${displayName.replace(/'/g,"\\'")}',${ST.week},-2.5,event)">−</button><div class="wt-val">${wt} kg</div><button class="wt-btn" onclick="adjWt('${displayName.replace(/'/g,"\\'")}',${ST.week},2.5,event)">+</button></div>`:''}
              </div>
            </div>
            <div class="ex-row"><div class="ex-hdr">
              <div style="flex:1">
                <div class="ex-name${ad?' is-done':''}">${displayName}${swapName?` <span style="font-size:16px;color:#833253;font-weight:400;opacity:0.7">(swapped)</span>`:''}</div>

            </div>

              <div class="ex-reps-label">Reps:</div>

          for(let i=0;i<ex.s;i++){

          if(!ex.bw&&wt){const nudge=getNudge(displayName,wt,ex.s,parseInt(ex.r)||10);if(nudge){const nk=nudge.nudgeKey.replace(/'/g,"\\'");h+=`<div class="prog-nudge"><div class="prog-nudge-icon">📈</div><div class="prog-nudge-text"><strong>Ready to progress?</strong>You've hit ${nudge.sets}×${parseInt(ex.r)||10} at ${nudge.weight} kg ${nudge.distinctDays} times — try <strong style="color:var(--accent)">${nudge.nextWeight} kg</strong> next time!</div><button class="prog-nudge-dismiss" onclick="dismissNudge('${nk}',event)" title="Dismiss">×</button></div>`;}}

        });

      h+=`</div>`;
    });

    const noteKey=`${ST.week}-${ST.dayIdx}`;
    h+=`<div class="notes-block">
      <div class="notes-label">Session notes</div>
      <textarea id="notes-ta" placeholder="How did it feel? Any injuries, PRs, or wins..." onchange="saveNote(this.value)">${NOTES[noteKey]||''}</textarea>

  }else if(ST.view==='progress'){
    const weeksByMonth={};
    for(let w=1;w<=16;w++){const mon=programToDate(w,0);const key=mon.toLocaleDateString('en-US',{month:'long',year:'numeric'});if(!weeksByMonth[key])weeksByMonth[key]=[];weeksByMonth[key].push(w);}
    let totalDone=0,totalSets=0,startedWeeks=0;
    for(let w=1;w<=16;w++){const c=weekComp(w);if(c>0)startedWeeks++;let wt=0,wd=0;bw(w).days.forEach((_,di)=>{if(bw(w).days[di].sessions[0]?.type==='rest')return;const ch=ST.progress[`${w}-${di}`]||{};bw(w).days[di].sessions.forEach((s,si)=>{if(s.exercises)s.exercises.forEach((ex,ei)=>{for(let i=0;i<ex.s;i++){wt++;if(ch[`${si}-${ei}-${i}`])wd++;}});else{wt++;if(ch[`run-${si}`])wd++;}});});totalSets+=wt;totalDone+=wd;}

    }

    Object.entries(weeksByMonth).forEach(([monthLabel,weeks])=>{
      h+=`<div class="prog-month-section"><div class="prog-month-title">${monthLabel}</div>`;
      weeks.forEach(w=>{
        const comp=weekComp(w),isCur=w===ST.week;
        const dayPips=bw(w).days.map((_,di)=>{if(bw(w).days[di].sessions[0]?.type==='rest')return'rest';const c=dayComp(w,di);return c===100?'done':c>0?'partial':'empty';});
        h+=`<div class="prog-week-card" style="${isCur?'border-color:rgba(0,255,127,0.35)':''}" onclick="calSelDay(${w},0)">
          <div class="prog-week-top"><div class="prog-week-label">Week ${w} ${isCur?'<span style="font-size:10px;color:var(--accent);font-weight:700;margin-left:4px">NOW</span>':''}</div><div class="prog-week-pct ${comp===0?'zero':''}">${comp>0?comp+'%':'—'}</div></div>
          <div class="prog-bar-bg"><div class="prog-bar-fill" style="width:${comp}%"></div></div>
          <div class="prog-week-days">${dayPips.map(p=>`<div class="prog-day-pip ${p==='done'?'done':p==='partial'?'partial':''}" style="${p==='rest'?'background:var(--card2)':''}"></div>`).join('')}</div>
        </div>`;
      });
      h+=`</div>`;
    });
    h+=`</div>`;

  }else if(ST.view==='backup'){
    h+=`<div class="pad">
      <div class="bk-section"><h3>Google Sheets Sync</h3>
        <p style="font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:6px">Two-way sync. Tap ↻ Sync to pull latest data from any device. Auto-pushes on every set.</p>
        <div class="sh-label">Apps Script URL</div><input id="sh-url" type="url" value="${CFG.url}" placeholder="https://script.google.com/macros/s/..."/>
        <div class="sh-label">Secret key</div><input id="sh-key" type="password" value="${CFG.key}" placeholder="Your secret key"/>
        <button class="sh-save" onclick="saveSheets()">Save connection</button>
        <div style="display:flex;align-items:center;gap:10px;margin-top:10px">
          <button id="sync-btn" class="sync-btn" onclick="syncPull()" type="button">↻ Sync</button>
          <span style="font-size:12px;color:var(--muted)">${CFG.url?'Pull latest data from the connected sheet':'Connect first to enable sync.'}</span>
        </div>
        <div class="sync-row"><div class="sdot ${CFG.url?'on':''}"></div><span>${CFG.url?'Connected · auto-push on every set · tap ↻ Sync to pull':'Not connected'}</span></div>
      </div>
      <div class="bk-section"><h3>🔔 Notifications</h3>
        <p style="font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:10px">Enable push notifications to remind you when today's workout hasn't been logged.</p>
        <button class="bk-btn bk-green" style="width:100%" onclick="requestNotifPermission()">${'Notification' in window&&Notification.permission==='granted'?'✓ Notifications on':'Enable notifications'}</button>
        ${'Notification' in window&&Notification.permission==='granted'?`<button class="bk-btn bk-neutral" style="max-width:200px;margin-top:8px" onclick="scheduleWorkoutReminder()">Send test reminder</button>`:''}
      </div>
      <div class="bk-section"><h3>Rest timer</h3>
        <div style="display:flex;align-items:center;gap:12px;margin-top:6px">
          <button class="wt-btn" style="width:30px;height:30px;font-size:18px" onclick="chgRest(-15)">−</button>
          <span id="rd" style="font-size:16px;font-weight:700;min-width:46px;text-align:center">${ST.restSecs}s</span>
          <button class="wt-btn" style="width:30px;height:30px;font-size:18px" onclick="chgRest(15)">+</button>
          <span style="font-size:12px;color:var(--muted)">between sets</span>
        </div>
      </div>
      <div class="bk-section"><h3>Program start date</h3>
        <p style="font-size:12px;color:var(--muted);line-height:1.6">Currently: ${PROGRAM_START.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})}. Edit <code style="font-size:11px">PROGRAM_START</code> in the HTML to change it.</p>
      </div>
      <div class="bk-section"><h3>Export / Import</h3>
        <p style="font-size:13px;color:var(--muted);line-height:1.6">Full backup includes progress, weights, notes, run log and PRs.</p>
        <div class="bk-btns"><button class="bk-btn bk-green" onclick="expBk()">⬇ Export JSON</button><button class="bk-btn bk-neutral" onclick="impBk()">⬆ Import JSON</button></div>
      </div>
      <div class="bk-section"><h3>Reset</h3>
        <div class="bk-btns"><button class="bk-btn bk-red" onclick="doReset()">Reset all progress</button></div>
      </div>
      <div style="font-size:11px;color:var(--muted);text-align:center;padding:8px 0">v5.0 · PR tracker · Notes · Run log · Volume · Swap · Auto-progression</div>
    </div>`;
  }

  // Calendar overlay
  if(ST.calOpen)h+=`<div class="cal-modal-overlay" id="cal-overlay" onclick="calCancel()"></div>`;

  // Swap modal
  if(ST.swapModal){
    const opts=SWAPS[ST.swapModal]||[];
    h+=`<div class="swap-modal-overlay" onclick="closeSwap()"><div class="swap-modal" onclick="event.stopPropagation()">
      <div class="swap-modal-hdr"><h3>Swap exercise</h3><p>Replacing: ${ST.swapModal}</p></div>
      ${opts.map(o=>`<div class="swap-item" onclick="doSwap('${ST.swapModal.replace(/'/g,"\\'")}','${o.n.replace(/'/g,"\\'")}')"><div><div class="swap-item-name">${o.n}</div><div class="swap-item-meta">${o.bw?'Bodyweight':'Weighted'}</div></div><span style="color:var(--accent);font-size:20px">→</span></div>`).join('')}
      <button class="swap-cancel" onclick="closeSwap()">Cancel</button>
    </div></div>`;
  }

  // Confirm complete modal
  if(ST.confirmOpen){
    h+=`<div class="confirm-overlay" onclick="cancelComplete()"><div class="confirm-modal" onclick="event.stopPropagation()">
      <div class="confirm-elapsed">${fmtElapsed()}</div>
      <div class="confirm-modal-title">End workout?</div>
      <div class="confirm-modal-sub">This will mark your session as done and save all progress.</div>
      <button class="confirm-yes" onclick="confirmComplete()"><div class="confirm-yes-icon"><svg width="33" height="23" viewBox="0 0 33 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12.1666L11.0449 21.5L31.5 1.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></div><span style="flex:1;text-align:center">End workout</span></button>
      <button class="confirm-no" onclick="cancelComplete()">Resume workout</button>
    </div></div>`;
  }

  // Success screen
  if(ST.successData){
    const sd=ST.successData;
    const nudges=getActiveNudges();
    h+=`<div class="success-screen">
      <div class="success-bg"></div>
      <div class="success-particles">${genParticles()}</div>
      <div class="success-body">
        <div class="success-tag">Week ${ST.week} · ${day.name}</div>
        <div class="success-h1">great job!</div>
        <div class="success-h2">on your<br>workout</div>
        <div class="success-pills">
          <span class="success-pill">⏱ ${sd.elapsed}m</span>
          <span class="success-pill">💪 ${sd.sets} sets</span>
          ${sd.vol>0?`<span class="success-pill">🏋️ ${Math.round(sd.vol)} kg</span>`:''}
          ${sd.prs.length?`<span class="success-pill">🏆 ${sd.prs.length} PR${sd.prs.length>1?'s':''}</span>`:''}
        </div>
        ${sd.prs.length?`<div style="font-size:13px;color:rgba(255,255,255,0.5);margin-bottom:8px">${sd.prs.map(p=>`${p.name} — ${p.weight} kg`).join(' · ')}</div>`:''}
        ${nudges.length?`<div style="font-size:13px;color:rgba(59,102,255,0.85);margin-bottom:8px">📈 ${nudges.map(n=>`${n.exName} → try ${n.nextWeight} kg`).join(' · ')}</div>`:''}
        <div class="success-desc">Hold on while we build your custom plan for next session.</div>
      </div>
      <div class="success-bar">
        <div class="success-icon-btn" onclick="closeSuccess()">↩</div>
        <button class="success-done-btn" onclick="closeSuccess()">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none"><path d="M2 9.5l4.5 4.5 9-9" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Done
        </button>
        <div class="success-icon-btn" onclick="setView('progress')">📊</div>
      </div>
    </div>`;
  }

  // Bottom tab bar
  h+=`<div class="btm-tabbar-wrap"><div class="btm-tabbar">
    <button class="btm-tab ${ST.view==='workout'?'active':''}" onclick="setView('workout')"><span class="btm-tab-txt">Schedule</span></button>
    <button class="btm-tab ${ST.view==='progress'?'active':''}" onclick="setView('progress')"><span class="btm-tab-txt">Progress</span></button>
    <button class="btm-tab ${ST.view==='backup'?'active':''}" onclick="setView('backup')"><span class="btm-tab-txt">Settings</span></button>
  </div></div>`;

  document.getElementById('app').innerHTML=h;
  renderTimer();renderSyncBtn();
  if(ST.calOpen)renderCalModal();
  queueMicrotask(attachSetGestures);
  updateFixedBtn();
}

function setupFixedBtn(){
  if(document.getElementById('workout-fixed-btn'))return;
  const el=document.createElement('button');
  el.id='workout-fixed-btn';
  el.type='button';
  document.body.appendChild(el);
  function checkScroll(){
    const orig=document.querySelector('.workout-action-btn');
    if(!orig){el.classList.remove('visible');return;}
    el.classList.toggle('visible',orig.getBoundingClientRect().bottom<=24);
  }
  document.addEventListener('scroll',checkScroll,{passive:true});
  window._fixedBtnScrollCheck=checkScroll;
}

function updateFixedBtn(){
  setupFixedBtn();
  const el=document.getElementById('workout-fixed-btn');
  if(!el)return;
  const ch=getCh();
  const chkIco=`<svg width="33" height="23" viewBox="0 0 33 23" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M1.5 12.1666L11.0449 21.5L31.5 1.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  const pauseIco=`<svg width="20" height="28" viewBox="0 0 20 28" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M18.5 1.5V26.5M1.5 1.5V26.5" stroke="white" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
  if(ST.workoutStartTime){
    el.className='workout-action-btn-fixed fixed-pause';
    el.onclick=()=>window.pauseAndConfirm();
    el.innerHTML=`<span style="flex:1;text-align:center;color:#2C0012;font-size:28px;font-family:Inter;font-weight:400"><span id="workout-elapsed-fixed">${fmtElapsed()}</span> · Pause</span><div class="workout-btn-icon">${pauseIco}</div>`;
  }else{
    const label=Object.keys(ch).length>0?'Continue workout':'Start workout';
    el.className='workout-action-btn-fixed fixed-start';
    el.onclick=()=>window.startWorkout();
    el.innerHTML=`<span style="flex:1;text-align:center;color:#2C0012;font-size:28px;font-family:Inter;font-weight:400">${label}</span><div class="workout-btn-icon">${chkIco}</div>`;
  }
  if(window._fixedBtnScrollCheck)window._fixedBtnScrollCheck();
}

function attachSetGestures(){
  document.querySelectorAll('.set-btn[data-si]').forEach(btn=>{
    if(btn._g)return;btn._g=1;
    btn.addEventListener('click',()=>{if(btn._skip){btn._skip=false;return;}window.togSet(+btn.dataset.si,+btn.dataset.ei,+btn.dataset.idx);});
    let sx,sy,tmr;
    btn.addEventListener('pointerdown',e=>{sx=e.clientX;sy=e.clientY;tmr=setTimeout(()=>{tmr=null;btn._skip=true;window.togSet(+btn.dataset.si,+btn.dataset.ei,+btn.dataset.idx);},480);},{passive:true});
    btn.addEventListener('pointerup',e=>{clearTimeout(tmr);if(!sx)return;const dx=e.clientX-sx,dy=e.clientY-sy;if(dx>52&&Math.abs(dy)<90){btn._skip=true;window.togSet(+btn.dataset.si,+btn.dataset.ei,+btn.dataset.idx);}});
    btn.addEventListener('pointerleave',()=>clearTimeout(tmr));
    btn.addEventListener('pointercancel',()=>clearTimeout(tmr));
  });
}

// ── HANDLERS ─────────────────────────────────────────────────
window.setView=v=>{ST.view=v;ST.calOpen=false;render();};
window.openCal=openCal;window.calNavMonth=calNavMonth;window.calClickDate=calClickDate;window.calConfirm=calConfirm;window.calCancel=calCancel;
window.calSelDay=(w,di)=>{ST.week=w;ST.dayIdx=di;ST.view='workout';ST.workoutStartTime=null;ST.workoutPaused=false;ST.pauseStartTime=null;ST.pausedDuration=0;ST.summaryData=null;ST.successData=null;stopElapsedTick();render();};
window.jumpToday=()=>{const tp=dateToProgram(new Date());if(!tp)return;ST.week=tp.week;ST.dayIdx=tp.dayIdx;ST.summaryData=null;ST.successData=null;render();};

window.togSet=(si,ei,idx)=>{
  const key=`${si}-${ei}-${idx}`,ch={...getCh()};
  const prev=!!ch[key];ch[key]=!ch[key];setCh(ch);
  if(ch[key]&&!prev){startTimer();}else if(!ch[key])stopTimer();
  if(ch[key]){const ex=bw(ST.week).days[ST.dayIdx].sessions[si]?.exercises?.[ei];if(ex&&!ex.bw){const wt=getW(ex.n,ST.week);if(wt)checkAndSetPR(ex.n,wt);}}
  const ex=bw(ST.week).days[ST.dayIdx].sessions[si]?.exercises?.[ei];
  if(ex&&!ex.bw&&ch[key]){
    const wt=getW(ex.n,ST.week);
    const allDone=Array.from({length:ex.s},(_,i)=>!!ch[`${si}-${ei}-${i}`]).every(Boolean);
    if(allDone&&wt)checkExerciseComplete(ex.n,wt,ex.s,parseInt(ex.r)||10,ST.week,ST.dayIdx);
  }
  render();
  if(CFG.url)syncPush();
};
window.togRun=si=>{const key=`run-${si}`,ch={...getCh()};ch[key]=!ch[key];setCh(ch);render();if(CFG.url)syncPush();};
window.adjWt=(name,week,delta,e)=>{e.stopPropagation();const cur=WTS[name]!==undefined?WTS[name]:(sugWt(name,week)||0);WTS[name]=Math.max(0,+(cur+delta).toFixed(2));sv();render();if(CFG.url)syncPush();};
window.chgRest=d=>{ST.restSecs=Math.max(15,Math.min(300,ST.restSecs+d));const el=document.getElementById('rd');if(el)el.textContent=ST.restSecs+'s';};
window.saveSheets=()=>{CFG.url=(document.getElementById('sh-url')?.value||'').trim();CFG.key=(document.getElementById('sh-key')?.value||'').trim();sv();render();};
window.syncPull=syncPull;window.stopTimer=stopTimer;

window.saveNote=val=>{NOTES[`${ST.week}-${ST.dayIdx}`]=val;sv();};
window.startWorkout=()=>{ST.workoutStartTime=Date.now();ST.pausedDuration=0;ST.workoutPaused=false;ST.pauseStartTime=null;startElapsedTick();render();};
window.pauseWorkout=()=>{ST.pauseStartTime=Date.now();ST.workoutPaused=true;render();};
window.resumeWorkout=()=>{if(ST.pauseStartTime)ST.pausedDuration=(ST.pausedDuration||0)+(Date.now()-ST.pauseStartTime);ST.pauseStartTime=null;ST.workoutPaused=false;render();};
window.pauseAndConfirm=()=>{pauseWorkout();ST.confirmOpen=true;render();};
let HOLD_TM=null,HOLD_RAF=null;
window.holdStart=(btn,e)=>{
  e.preventDefault();
  const fill=btn.querySelector('.hold-fill');
  const start=Date.now();
  if(fill){fill.style.transition='none';fill.style.transform='scaleX(0)';}
  function tick(){
    const p=Math.min(1,(Date.now()-start)/1500);
    if(fill)fill.style.transform=`scaleX(${p})`;
    if(p<1)HOLD_RAF=requestAnimationFrame(tick);
  }
  HOLD_RAF=requestAnimationFrame(tick);
  HOLD_TM=setTimeout(()=>{HOLD_TM='fired';if(fill){fill.style.transform='scaleX(0)';}showCompleteConfirm();},1500);
};
window.holdEnd=(btn)=>{
  cancelAnimationFrame(HOLD_RAF);HOLD_RAF=null;
  const fill=btn.querySelector('.hold-fill');
  if(fill){fill.style.transition='transform 0.15s';fill.style.transform='scaleX(0)';}
  if(HOLD_TM==='fired'){HOLD_TM=null;return;}
  if(HOLD_TM){clearTimeout(HOLD_TM);HOLD_TM=null;pauseWorkout();}
};
window.holdCancel=(btn)=>{
  cancelAnimationFrame(HOLD_RAF);HOLD_RAF=null;
  const fill=btn.querySelector('.hold-fill');
  if(fill){fill.style.transition='transform 0.15s';fill.style.transform='scaleX(0)';}
  if(HOLD_TM&&HOLD_TM!=='fired'){clearTimeout(HOLD_TM);HOLD_TM=null;}
};
window.saveRunLog=(si,field,val)=>{const k=`${ST.week}-${ST.dayIdx}-${si}`;RUNLOG[k]=RUNLOG[k]||{};RUNLOG[k][field]=val;sv();};

window.openSwap=name=>{ST.swapModal=name;render();};
window.closeSwap=()=>{ST.swapModal=null;render();};
window.doSwap=(orig,newName)=>{SWAPPED[`${ST.week}-${ST.dayIdx}-${orig}`]=newName;ST.swapModal=null;sv();render();};
window.clearSwap=orig=>{delete SWAPPED[`${ST.week}-${ST.dayIdx}-${orig}`];sv();render();};

// Complete workout flow
window.showCompleteConfirm=()=>{ST.confirmOpen=true;render();};
window.cancelComplete=()=>{ST.confirmOpen=false;resumeWorkout();};
window.confirmComplete=()=>{
  ST.confirmOpen=false;
  const elapsed=ST.workoutStartTime?Math.max(1,Math.round((Date.now()-ST.workoutStartTime)/60000)):0;
  const vol=calcVolume(ST.week,ST.dayIdx);
  let sets=0;const ch=getCh();
  bw(ST.week).days[ST.dayIdx].sessions.forEach((s,si)=>{
    if(s.exercises)s.exercises.forEach((ex,ei)=>{for(let i=0;i<ex.s;i++){if(ch[`${si}-${ei}-${i}`])sets++;}});
  });
  const prs=[];
  bw(ST.week).days[ST.dayIdx].sessions.forEach(s=>{
    if(!s.exercises)return;
    s.exercises.forEach(ex=>{
      if(ex.bw)return;
      const wt=getW(ex.n,ST.week);
      if(wt&&checkAndSetPR(ex.n,wt))prs.push({name:ex.n,weight:wt});
    });
  });
  stopElapsedTick();
  stopTimer();
  ST.successData={elapsed,vol,sets,prs};
  sv();
  if(CFG.url)syncPush();
  render();
};
window.closeSuccess=()=>{ST.successData=null;ST.workoutStartTime=null;ST.workoutPaused=false;ST.pauseStartTime=null;ST.pausedDuration=0;stopElapsedTick();render();};

window.requestNotifPermission=requestNotifPermission;
window.scheduleWorkoutReminder=scheduleWorkoutReminder;

window.expBk=()=>{const b=new Blob([JSON.stringify({v:6,ts:new Date().toISOString(),progress:ST.progress,weights:WTS,notes:NOTES,runlog:RUNLOG,prs:PRS,wphist:WPHIST,dismissedNudges:DISMISSED_NUDGES},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=`training-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();};
window.impBk=()=>{const inp=document.createElement('input');inp.type='file';inp.accept='.json';inp.onchange=e=>{const fr=new FileReader();fr.onload=ev=>{try{const d=JSON.parse(ev.target.result);if(d.progress)ST.progress=d.progress;if(d.weights)WTS=d.weights;if(d.notes)NOTES=d.notes;if(d.runlog)RUNLOG=d.runlog;if(d.prs)PRS=d.prs;if(d.wphist)WPHIST=d.wphist;if(d.dismissedNudges)DISMISSED_NUDGES=d.dismissedNudges;sv();render();}catch{alert('Invalid backup file.');}};fr.readAsText(e.target.files[0]);};inp.click();};
window.doReset=()=>{if(confirm('Reset ALL data? This cannot be undone.')){ST.progress={};WTS={};NOTES={};RUNLOG={};PRS={};SWAPPED={};WPHIST={};DISMISSED_NUDGES={};sv();render();}};

// ── OFFLINE INDICATOR ────────────────────────────────────────
(function(){
  const bar=document.createElement('div');
  bar.className='offline-bar';
  bar.innerHTML='<div class="offline-dot"></div>Offline — changes saved locally, will sync when back online';
  document.body.appendChild(bar);
  function update(){const offline=!navigator.onLine;bar.classList.toggle('visible',offline);document.body.classList.toggle('offline',offline);}
  window.addEventListener('online',()=>{update();syncPush();});
  window.addEventListener('offline',update);
  update();
  setInterval(()=>{if(navigator.onLine)syncPush();},5*60*1000);
})();

// ── INIT ─────────────────────────────────────────────────────
load();
const todayProg=dateToProgram(new Date());
if(todayProg){ST.week=todayProg.week;ST.dayIdx=todayProg.dayIdx;}
render();
</script>
</body>
